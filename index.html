<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#5e9e1f">
<title>Pedidos & Qualidade — TOTAL FOOD</title>
<style>
  :root{
    --bg:#0b1120; --panel:#111a2e; --panel2:#16213a; --line:#233252;
    --txt:#e7ecf5; --muted:#94a3b8; --brand:#8cc63e; --brand2:#5e9e1f;
    --green:#22c55e; --yellow:#eab308; --orange:#f97316; --red:#ef4444;
    --blue:#3b82f6; --card-radius:16px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 80% -10%,#13243f 0%,var(--bg) 55%);
    color:var(--txt); -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:var(--brand)}
  .hidden{display:none!important}

  /* ---------- LOGIN ---------- */
  #login{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:430px;background:var(--panel);border:1px solid var(--line);
    border-radius:20px;padding:32px;box-shadow:var(--shadow)}
  .hero{margin:-32px -32px 0;height:150px;border-radius:20px 20px 0 0;overflow:hidden;position:relative;
    background:#0e1a10 top center/cover no-repeat;background-image:url('banner.png')}
  .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,17,32,0) 45%,var(--panel) 100%)}
  .brand-badge{width:120px;height:120px;margin:-58px auto 0;position:relative;z-index:2;background:#fff;
    border-radius:26px;display:flex;align-items:center;justify-content:center;padding:14px;
    box-shadow:0 14px 34px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.15)}
  .brand-badge img{max-width:100%;max-height:100%;object-fit:contain}
  .brand-badge-sm{width:34px;height:34px;border-radius:9px;background:#fff;display:flex;align-items:center;
    justify-content:center;padding:4px;flex-shrink:0}
  .brand-badge-sm img{max-width:100%;max-height:100%;object-fit:contain}
  .access-title{text-align:center;margin:14px 0 2px;font-size:22px;font-weight:800}
  .access-sub{text-align:center;margin:0 auto 4px;color:var(--muted);font-size:13px;max-width:320px;line-height:1.5}
  .trust{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:14px 0 2px}
  .trust span{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
    padding:4px 10px;border-radius:999px}
  .field{margin-top:16px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:12px 14px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:15px;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#042;font-weight:700;font-size:15px;margin-top:20px;transition:.15s}
  .btn:hover{filter:brightness(1.08)}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);font-weight:600}
  .btn.sm{width:auto;padding:9px 14px;margin:0;font-size:13px}
  .btn.danger{background:linear-gradient(135deg,#ef4444,#b91c1c);color:#fff}
  .err{color:var(--red);font-size:13px;margin-top:10px;min-height:16px}
  .muted-link{display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);background:none;border:none;width:100%}
  .muted-link:hover{color:var(--brand)}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100%}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
    padding:12px 18px;background:rgba(11,17,32,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar .brand-badge-sm{width:38px;height:38px}
  .topbar .tt{font-size:15px;font-weight:800;line-height:1.05}
  .topbar .tt small{display:block;font-size:11px;color:var(--muted);font-weight:500}
  .topbar .who{margin-left:auto;text-align:right;font-size:13px}
  .topbar .who b{display:block}
  .topbar .who span{color:var(--muted);font-size:12px}
  .layout{display:flex}
  .nav{width:230px;flex-shrink:0;padding:16px 12px;border-right:1px solid var(--line);min-height:calc(100vh - 63px)}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
    border:none;color:var(--muted);padding:11px 12px;border-radius:10px;font-size:14px;margin-bottom:4px}
  .nav button:hover{background:var(--panel)}
  .nav button.active{background:var(--panel);color:var(--txt);font-weight:600;box-shadow:inset 3px 0 0 var(--brand)}
  .nav .ico{width:20px;text-align:center}
  .content{flex:1;padding:24px;max-width:1180px;margin:0 auto;width:100%}
  h2.page{margin:0 0 4px;font-size:23px}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 20px;line-height:1.5}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--card-radius);padding:18px}
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .kpi .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:30px;font-weight:800;margin-top:6px}
  .kpi .val small{font-size:14px;color:var(--muted);font-weight:500}

  .section-title{font-size:15px;font-weight:700;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.4px}
  tr:hover td{background:var(--panel2)}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .b-ok{background:rgba(34,197,94,.15);color:#86efac}
  .b-auto{background:rgba(249,115,22,.16);color:#fdba74}
  .b-fechado{background:rgba(148,163,184,.15);color:#cbd5e1}
  .b-aberto{background:rgba(59,130,246,.16);color:#93c5fd}

  /* ---------- PEDIDO (cliente) ---------- */
  .meal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
  .meal.closed{opacity:.92;border-style:dashed}
  .meal-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .meal-emoji{font-size:26px;width:44px;height:44px;border-radius:12px;background:var(--panel2);
    display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .meal-head h3{margin:0;font-size:17px}
  .meal-head .prazo{font-size:12px;color:var(--muted);margin-top:2px}
  .meal-status{margin-left:auto;text-align:right}
  .qty{display:flex;align-items:center;gap:10px;margin-top:14px}
  .qty button{width:48px;height:48px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);font-size:24px;font-weight:700;line-height:1}
  .qty button:hover{border-color:var(--brand)}
  .qty input{width:110px;height:48px;text-align:center;font-size:24px;font-weight:800;border-radius:12px;
    border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  .qty .unit{color:var(--muted);font-size:13px}
  .qty input:disabled,.qty button:disabled{opacity:.5;cursor:not-allowed}
  .hint{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5}
  .hint b{color:var(--txt)}
  .auto-note{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:#fdba74;
    border-radius:10px;padding:10px 12px;font-size:12.5px;margin-top:12px;line-height:1.5}
  .save-bar{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(11,17,32,0),var(--bg) 40%);
    padding:16px 0 4px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .save-bar .saved{color:var(--green);font-size:13px}

  .datebar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .datebar .lbl{font-size:13px;color:var(--muted)}
  .datebar input[type=date]{padding:9px 12px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel2);color:var(--txt);font-size:14px}
  .pill-day{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px}
  .pill-day b{color:var(--brand)}

  .urgente{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.04));
    border:1px solid rgba(239,68,68,.35);border-radius:14px;padding:16px;margin-top:8px}
  .urgente .ic{font-size:26px}
  .urgente b{color:#fca5a5}
  .urgente .call{margin-left:auto}
  .call-btn{display:inline-flex;align-items:center;gap:8px;background:#22c55e;color:#042;font-weight:700;
    text-decoration:none;padding:11px 16px;border-radius:10px;font-size:14px;white-space:nowrap}

  /* toast */
  #toasts{position:fixed;right:18px;bottom:18px;z-index:100;display:flex;flex-direction:column;gap:10px;max-width:340px}
  .toast{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--brand);
    border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);animation:slidein .25s}
  .toast.warn{border-left-color:var(--orange)}
  .toast b{display:block;font-size:13px;margin-bottom:2px}
  .toast span{font-size:12.5px;color:var(--muted)}
  @keyframes slidein{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(2,6,16,.7);display:flex;align-items:center;justify-content:center;
    z-index:90;padding:20px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;width:100%;max-width:480px;
    max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 4px;font-size:18px}
  .modal .sub{margin-bottom:16px}
  .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .price-grid .field{margin-top:0}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
  .tag{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
    padding:2px 8px;border-radius:6px;margin-left:6px}

  @media(max-width:820px){
    .nav{display:none}
    .content{padding:16px}
    .mobile-tabs{display:flex!important}
    .price-grid{grid-template-columns:1fr}
  }
  .mobile-tabs{display:none;position:sticky;bottom:0;z-index:30;background:rgba(11,17,32,.95);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);justify-content:space-around;padding:6px}
  .mobile-tabs button{background:none;border:none;color:var(--muted);font-size:11px;display:flex;
    flex-direction:column;align-items:center;gap:3px;padding:6px 10px;flex:1}
  .mobile-tabs button .ico{font-size:18px}
  .mobile-tabs button.active{color:var(--brand)}

  /* ---------- QUALIDADE (gestão + opinião) ---------- */
  .b-andamento{background:rgba(59,130,246,.16);color:#93c5fd}
  .b-resolvido{background:rgba(34,197,94,.15);color:#86efac}
  .b-encerrado{background:rgba(148,163,184,.16);color:#cbd5e1}
  .b-baixa{background:rgba(34,197,94,.15);color:#86efac}
  .b-media{background:rgba(234,179,8,.15);color:#fde047}
  .b-alta{background:rgba(249,115,22,.16);color:#fdba74}
  .b-critica{background:rgba(239,68,68,.16);color:#fca5a5}
  .therm-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .therm{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;border:1px solid var(--line);background:var(--panel)}
  .therm .light{width:42px;height:42px;border-radius:50%;flex-shrink:0}
  .therm .t-green{background:var(--green);box-shadow:0 0 18px -2px var(--green)}
  .therm .t-yellow{background:var(--yellow);box-shadow:0 0 18px -2px var(--yellow)}
  .therm .t-orange{background:var(--orange);box-shadow:0 0 18px -2px var(--orange)}
  .therm .t-red{background:var(--red);box-shadow:0 0 18px -2px var(--red)}
  .therm .t-name{font-weight:700}
  .therm .t-msg{font-size:12px;color:var(--muted);margin-top:3px}
  .trend{font-size:12px;margin-top:4px}
  .trend.up{color:var(--green)} .trend.down{color:var(--red)}
  .pill-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .pill-tabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:9px 16px;border-radius:999px;font-size:14px}
  .pill-tabs button.active{background:var(--brand);color:#042;border-color:var(--brand);font-weight:700}
  .bars{display:flex;align-items:flex-end;gap:10px;height:160px;padding-top:10px}
  .bars .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bars .bar .fill{width:100%;max-width:48px;background:linear-gradient(180deg,var(--brand),var(--brand2));border-radius:8px 8px 0 0;transition:height .4s}
  .bars .bar .lbl{font-size:11px;color:var(--muted)} .bars .bar .v{font-size:12px;font-weight:700}
  .line-chart{width:100%;height:170px}
  .help-bar{background:linear-gradient(135deg,rgba(140,198,62,.1),rgba(94,158,31,.04));
    border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:13px;color:var(--muted);margin:18px 0}
  .help-bar b{color:var(--txt)}
  .opi-choice{display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:16px;margin-bottom:10px;color:var(--txt);font-size:15px;font-weight:700}
  .opi-choice:hover{border-color:var(--brand)}
  .opi-choice.sel{border-color:var(--brand);box-shadow:inset 3px 0 0 var(--brand)}
  .opi-choice .emo{font-size:20px;margin-right:8px}
  .opi-choice small{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:3px}

  /* ---------- IMPRESSÃO (ficha de expedição — meia folha A4) ---------- */
  #printArea{display:none}
  .ficha{color:#000;background:#fff;font-family:Arial,sans-serif;padding:4px 4px 2px;font-size:9px}
  /* cabeçalho numa linha só */
  .ficha .fh{display:flex;justify-content:space-between;align-items:center;border-bottom:1.5px solid #000;padding-bottom:2px;margin-bottom:3px}
  .ficha .fh-logo{font-size:12px;font-weight:800;letter-spacing:.3px}
  .ficha .fh-sub{font-size:7px;color:#444}
  .ficha .fh-dia{font-size:10px;font-weight:800}
  /* info empresa + resumo lado a lado */
  .ficha .ftopo{display:flex;gap:6px;margin-bottom:3px;align-items:flex-start}
  .ficha .finfo{flex:1.2;border-collapse:collapse;font-size:8px}
  .ficha .finfo td{border:1px solid #999;padding:1px 3px}
  .ficha .fresumo{flex:0.8;border-collapse:collapse;font-size:8px}
  .ficha .fresumo th,.ficha .fresumo td{border:1px solid #333;padding:1px 3px;text-align:left}
  .ficha .fresumo th{background:#eee;font-weight:700;font-size:7px}
  .ficha .fresumo .q{text-align:center;font-size:10px;font-weight:800;width:36px}
  .ficha .fresumo tfoot td{background:#f3f3f3;font-weight:700}
  /* checklists em 2 colunas */
  .ficha .cl-wrap{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-top:2px}
  .ficha .cl-bloco{break-inside:avoid}
  .ficha .cl-title{font-weight:800;font-size:8.5px;margin:0 0 1px;background:#f5f5f5;padding:1px 2px;border-left:3px solid #333}
  .ficha .cl-title .cl-g{font-weight:400;font-size:7px;color:#666}
  .ficha .fitens{width:100%;border-collapse:collapse;font-size:8px}
  .ficha .fitens th,.ficha .fitens td{border:1px solid #ccc;padding:1px 3px;text-align:left}
  .ficha .fitens th{background:#eee;font-weight:700;font-size:7px}
  .ficha .fitens .q{text-align:center;font-size:9px;font-weight:800;width:38px}
  .ficha .fitens .chk{width:34px;text-align:center}
  .ficha .q2{text-align:right;color:#444;font-weight:600;width:60px;font-size:7px}
  .ficha .cl-none{font-size:7px;color:#666;margin:2px 0;font-style:italic}
  /* rodapé */
  .ficha .fbottom{margin-top:4px;border-top:1px solid #ccc;padding-top:2px;display:flex;gap:10px;font-size:7.5px}
  .ficha .fbottom .fobs{flex:1}
  .ficha .fbottom .fass{flex:1;display:flex;gap:6px}
  .ficha .fbottom .line{display:inline-block;border-bottom:1px solid #000;flex:1;min-width:40px}
  .ficha .ffoot{margin-top:2px;font-size:6.5px;color:#666}
  /* esconde classes antigas que não usamos mais */
  .ficha .fobs,.ficha .fass{display:none}
  @media print{
    @page{size:A4 portrait;margin:5mm}
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block!important;position:absolute;left:0;top:0;width:100%}
    html,body{background:#fff!important}
    .ficha{page-break-after:always;padding:0}
    .ficha:last-child{page-break-after:auto}
    .ficha .cl-wrap{display:grid!important;grid-template-columns:1fr 1fr!important}
  }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <div class="hero"></div>
    <div class="brand-badge"><img src="logo.png" alt="Total Food" onerror="this.style.display='none'"></div>
    <div class="access-title">TOTAL FOOD</div>
    <p class="access-sub">Peça suas refeições do dia e dê sua opinião — num só lugar. Acesse com o e-mail e a senha que a TOTAL FOOD criou pra sua empresa.</p>
    <div class="trust"><span>+10 anos</span><span>Frota própria</span><span>Refeições coletivas</span></div>

    <div class="field"><label>E-mail</label><input id="li-email" type="email" autocomplete="username" placeholder="seuemail@empresa.com"></div>
    <div class="field"><label>Senha</label><input id="li-senha" type="password" autocomplete="current-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="err" id="li-err"></div>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <button class="muted-link" onclick="recuperarSenha()">Esqueci minha senha</button>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="topbar">
    <div class="brand-badge-sm"><img src="logo.png" alt="TF" onerror="this.parentNode.textContent='TF'"></div>
    <div class="tt">TOTAL FOOD<small id="tb-context">Pedidos &amp; Qualidade</small></div>
    <div class="who">
      <b id="tb-nome">—</b>
      <span id="tb-perfil">—</span>
    </div>
    <button class="btn ghost sm" onclick="logout()" style="margin-left:14px">Sair</button>
  </div>

  <div class="layout">
    <nav class="nav" id="nav"></nav>
    <main class="content" id="content"></main>
  </div>

  <div class="mobile-tabs" id="mtabs"></div>
</div>

<div id="toasts"></div>
<div id="modal-root"></div>
<div id="printArea"></div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<!-- empresas pré-carregadas da planilha de faturamento (gerado por _gerar-empresas.js) -->
<script src="empresas-faturamento.js" onerror="window.EMPRESAS_FATURAMENTO=window.EMPRESAS_FATURAMENTO||null"></script>
<script>
/* =====================================================================
   CONFIG
   Mesmo projeto Firebase da Central de Qualidade — login e empresas
   já existentes funcionam aqui também.
===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyAiFZi_-xnPH87XECRiWr-nRsRLcb2JB-4",
  authDomain: "central-de-qualidade-totalfood.firebaseapp.com",
  projectId: "central-de-qualidade-totalfood",

  let perfil=null, nome=u.email, empresaId=null;

  }catch(e){ console.warn('ped_usuarios', e); }
  // 2) equipe da Qualidade = cozinha/admin

    try{
      const d=await db.collection('usuarios').doc(email).get();
      if(d.exists){ perfil='cozinha'; nome=d.data().nome||nome; }
    }catch(e){ console.warn('usuarios', e); }
  }
  // 3) rede de segurança
  if(!perfil && ADMIN_EMAILS.includes(email)){ perfil='cozinha'; }

  if(!perfil){
    document.getElementById('li-err').textContent='Sua conta ainda não tem acesso liberado. Fale com a cozinha da TOTAL FOOD.';

  USER={ email, nome, perfil, empresaId };

  document.getElementById('tb-nome').textContent=nome;

function subscribe(){
  _subs.forEach(f=>f()); _subs=[];
  const bind=(col,key)=> db.collection(col).onSnapshot(s=>{
    DB[key]=s.docs.map(d=>Object.assign({id:d.id}, d.data()));
    if(USER) render();
  }, err=>console.warn(col, err));
  _subs.push(bind('ped_empresas','empresas'));
  _subs.push(bind('ped_pedidos','pedidos'));
  _subs.push(bind('ped_cardapios','cardapios'));
  _subs.push(bind('responsaveis','responsaveis'));
  // ocorrências (opiniões): cozinha recebe alerta de nova; cliente só lê as suas
  _ocReady=false;
  _subs.push(db.collection('ocorrencias').onSnapshot(s=>{
    DB.ocorrencias = s.docs.map(d=>Object.assign({id:d.id}, d.data()));
    if(USER && USER.perfil==='cozinha' && _ocReady){
      s.docChanges().forEach(ch=>{ if(ch.type==='added'){ alertaNovaOpiniao(Object.assign({id:ch.doc.id}, ch.doc.data())); } });
    }
    _ocReady=true;
    if(USER) render();
  }, err=>console.warn('ocorrencias', err)));
  if(USER.perfil==='cozinha'){
    _subs.push(bind('ped_usuarios','pedusuarios'));
  }
}

}

/* =====================================================================
   DATAS E PRAZOS
===================================================================== */
function hoje(){ return new Date(); }
function ymd(d){ const z=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function parseYMD(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }
function addDays(s, n){ const d=parseYMD(s); d.setDate(d.getDate()+n); return ymd(d); }
function fmtData(s){
  const d=parseYMD(s); const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const z=n=>String(n).padStart(2,'0');
  return dias[d.getDay()]+', '+z(d.getDate())+'/'+z(d.getMonth()+1);
}
function fmtDataCurta(s){ const d=parseYMD(s); const z=n=>String(n).padStart(2,'0'); return z(d.getDate())+'/'+z(d.getMonth()+1); }

/* instante em que FECHA o pedido de uma refeição para a data alvo */
function deadline(refKey, dataAlvo){
  const r=REF_BY[refKey];
  const base = r.diaAnterior ? parseYMD(addDays(dataAlvo,-1)) : parseYMD(dataAlvo);
  base.setHours(r.hora, 0, 0, 0);
  return base;
}
function janelaAberta(refKey, dataAlvo){ return hoje() < deadline(refKey, dataAlvo); }

/* primeira data futura que ainda tem ALGUMA janela aberta (default do pedido) */
function proximaDataPedido(){
  let d = ymd(hoje());
  for(let i=0;i<3;i++){
    const alvo = addDays(d, i);
    if(parseYMD(alvo) < parseYMD(ymd(hoje()))) continue;
    if(REFEICOES.some(r=> janelaAberta(r.key, alvo))) return alvo;
  }
  return addDays(ymd(hoje()),1);
}

/* =====================================================================
   MODELO DE PEDIDOS
===================================================================== */
function pedidoId(empresaId, data){ return empresaId+'__'+data; }
function getPedido(empresaId, data){ return DB.pedidos.find(p=> p.empresaId===empresaId && p.data===data) || null; }
function getEmpresa(id){ return DB.empresas.find(e=>e.id===id) || null; }

/* valor EFETIVO de uma refeição para a cozinha:
   - se houver pedido explícito -> usa, origem 'pedido'
   - senão repete o último pedido explícito de dias anteriores -> origem 'auto'
   - senão 0, origem 'sem' */
function efetivo(empresaId, data, refKey){
  const p=getPedido(empresaId, data);
  if(p && p[refKey] && p[refKey].status==='pedido'){
    return {qtd:Number(p[refKey].qtd)||0, origem:'pedido', por:p[refKey].por||'', refData:data};
  }
  // procurar dia anterior com pedido explícito (até 14 dias atrás)
  for(let i=1;i<=14;i++){
    const dAnt=addDays(data,-i);
    const pa=getPedido(empresaId, dAnt);
    if(pa && pa[refKey] && pa[refKey].status==='pedido'){
      return {qtd:Number(pa[refKey].qtd)||0, origem:'auto', refData:dAnt};
    }
  }
  // fallback: quantidade contratada da empresa
  const emp=getEmpresa(empresaId);
  const contr = emp && emp.ref && emp.ref[refKey] ? Number(emp.ref[refKey].qtd)||0 : 0;
  if(contr>0) return {qtd:contr, origem:'auto', refData:null, contrato:true};
  return {qtd:0, origem:'sem', refData:null};
}

function refLigada(emp, refKey){ return emp && emp.ref && emp.ref[refKey] && emp.ref[refKey].on; }
function precoRef(emp, refKey){ return emp && emp.ref && emp.ref[refKey] ? Number(emp.ref[refKey].preco)||0 : 0; }
function contratoRef(emp, refKey){ return emp && emp.ref && emp.ref[refKey] ? Number(emp.ref[refKey].qtd)||0 : 0; }

function brl(v){ return 'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2}); }

/* =====================================================================
   CLIENTE — FAZER PEDIDO
===================================================================== */
function viewPedido(){
  const emp = getEmpresa(USER.empresaId);
  if(!emp){
    return `<h2 class="page">Fazer pedido</h2>
      <div class="empty">Sua empresa ainda não foi configurada para pedidos.<br>Fale com a cozinha da TOTAL FOOD.</div>`;
  }
  const data = PEDIDO_DATA || proximaDataPedido();
  const refsOn = REFEICOES.filter(r=> refLigada(emp, r.key));
  let html = `<h2 class="page">Fazer pedido</h2>
    <p class="sub">Empresa: <b style="color:var(--txt)">${esc(emp.nome)}</b>${emp.grupo?` <span class="tag">${esc(emp.grupo)}</span>`:''}</p>`;

  html += `<div class="datebar">
    <span class="lbl">Pedido para o dia:</span>
    <input type="date" id="pd-data" value="${data}" min="${ymd(hoje())}" onchange="mudaDataPedido(this.value)">
    <span class="pill-day">${fmtData(data)}</span>
  </div>`;

  if(refsOn.length===0){
    html+=`<div class="empty">Nenhuma refeição habilitada no contrato desta empresa ainda.</div>`;
    return html;
  }

  refsOn.forEach(r=>{
    const aberta = janelaAberta(r.key, data);
    const ef = efetivo(emp.id, data, r.key);
    const ped = getPedido(emp.id, data);
    const temPedido = ped && ped[r.key] && ped[r.key].status==='pedido';
    // valor no rascunho: pedido explícito do dia, senão sugestão (efetivo)
    let valorInput;
    if(_rascunho[r.key]!==undefined) valorInput=_rascunho[r.key];
    else if(temPedido) valorInput=Number(ped[r.key].qtd)||0;
    else valorInput = ef.qtd; // sugestão = repetição automática / contrato
    const contr = contratoRef(emp, r.key);

    html += `<div class="meal ${aberta?'':'closed'}">
      <div class="meal-head">
        <div class="meal-emoji">${r.emoji}</div>
        <div>
          <h3>${r.nome}</h3>
          <div class="prazo">Pedido até <b>${prazoTexto(r.key, data)}</b></div>
        </div>
        <div class="meal-status">${
          aberta
            ? (temPedido
              ? `<span class="badge b-ok">✓ Pedido feito</span>${ped[r.key].jaAlterou?` <span class="badge" style="background:#fdba74;color:#000;font-size:12px;font-weight:600">Alterado 1×</span>`:''}`
              : `<span class="badge b-aberto">Aberto</span>`)
            : `<span class="badge b-fechado">🔒 Fechado</span>`
        }</div>
      </div>`;

    if(aberta){
      html += `<div class="qty">
        <button onclick="stepQty('${r.key}',-10)" title="-10">−</button>
        <input type="number" id="q-${r.key}" min="0" step="1" value="${valorInput}" inputmode="numeric"
               onchange="setQty('${r.key}',this.value)" oninput="setQty('${r.key}',this.value)">
        <button onclick="stepQty('${r.key}',10)" title="+10">+</button>
        <span class="unit">refeições</span>
      </div>`;
      if(contr>0) html+=`<div class="hint">Seu contrato é de <b>~${contr}</b> ${r.nome.toLowerCase()}/dia. Ajuste se hoje for diferente.</div>`;
      if(!temPedido){
        html+=`<div class="auto-note">⚠️ Se você <b>não confirmar</b> até ${prazoTexto(r.key,data)}, repetimos automaticamente <b>${ef.qtd}</b> ${ef.origem==='auto'&&!ef.contrato?'(do último pedido)':ef.contrato?'(do contrato)':''}. Esse valor é cobrado mesmo se faltar ou sobrar.</div>`;
      }
    } else {
      // janela fechada: mostra o que vai/foi produzido
      html += `<div class="qty">
        <input type="number" value="${ef.qtd}" disabled>
        <span class="unit">refeições ${ef.origem==='pedido'?'(você pediu)':'(repetido automaticamente)'}</span>
      </div>`;
      if(ef.origem!=='pedido'){
        html+=`<div class="auto-note">🔒 O prazo deste pedido encerrou. Como não houve confirmação, repetimos <b>${ef.qtd}</b>${ef.refData?` do dia ${fmtDataCurta(ef.refData)}`:''}. Para mudança de urgência, ligue para o ${RESP_PEDIDOS.nome}.</div>`;
      }
    }
    html+=`</div>`;
  });

  // barra de salvar
  const algumAberto = refsOn.some(r=> janelaAberta(r.key, data));
  if(algumAberto){
    html += `<div class="save-bar">
      <button class="btn sm" onclick="salvarPedido('${data}')" style="margin:0">Confirmar pedido</button>
      <span class="saved" id="ped-saved"></span>
    </div>`;
  }

  // urgência
  html += `<div class="urgente">
    <div class="ic">📞</div>
    <div><b>Mudança de urgência ou prazo já fechou?</b><br>
      <span style="color:var(--muted);font-size:13px">Fale direto com ${RESP_PEDIDOS.nome}, responsável pelos pedidos — ${RESP_PEDIDOS.telExibe}</span></div>
    <div class="call"><a class="call-btn" href="https://wa.me/${RESP_PEDIDOS.tel}?text=${encodeURIComponent('Olá '+RESP_PEDIDOS.nome+'! Sou de '+emp.nome+' e preciso ajustar um pedido com urgência.')}" target="_blank">💬 WhatsApp</a>
      <a class="call-btn" style="background:#3b82f6;color:#fff" href="tel:+${RESP_PEDIDOS.tel}">📞 Ligar</a></div>
  </div>`;

  return html;
}
function prazoTexto(refKey, data){
  const r=REF_BY[refKey];
  const dia = r.diaAnterior ? addDays(data,-1) : data;
  const quando = r.diaAnterior ? `${fmtDataCurta(dia)} (véspera)` : `${fmtDataCurta(dia)} (mesmo dia)`;
  return `${String(r.hora).padStart(2,'0')}:00 de ${quando}`;
}
function mudaDataPedido(v){ PEDIDO_DATA=v; _rascunho={}; render(); }
function validaAlteracao(key, novaQtd, data){
  // valida se cliente pode alterar — retorna {ok, bloqueado, msg}
  const emp=getEmpresa(USER.empresaId); if(!emp) return {ok:false,bloqueado:false,msg:'Empresa não encontrada'};
  if(!refLigada(emp, key)) return {ok:true,bloqueado:false,msg:''};
  const ped=getPedido(emp.id, data);
  if(!ped || !ped[key] || ped[key].status!=='pedido') return {ok:true,bloqueado:false,msg:''}; // sem pedido anterior
  const qtdAnterior = ped[key].qtd || 0;
  const jaAlterou = ped[key].jaAlterou || false;
  const qtdOriginal = ped[key].qtdOriginal || qtdAnterior;
  if(jaAlterou) return {ok:false,bloqueado:true,msg:'Você já alterou este pedido uma vez. Para novas mudanças, ligue para '+RESP_PEDIDOS.nome+' · '+RESP_PEDIDOS.telExibe+'.'};
  const pct = Math.abs((novaQtd - qtdOriginal) / qtdOriginal * 100);
  if(pct > 10) return {ok:false,bloqueado:true,msg:'Alteração de '+Math.round(pct)+'% — máximo é 10%. Para mudanças maiores, ligue para '+RESP_PEDIDOS.nome+' · '+RESP_PEDIDOS.telExibe+'.'};
  return {ok:true,bloqueado:false,msg:''};
}
function setQty(key, v){
  _rascunho[key]=Math.max(0, Math.floor(Number(v)||0));
  // SEM validação durante edição — só ao salvar
}
function stepQty(key, delta){
  const el=document.getElementById('q-'+key);
  const cur = _rascunho[key]!==undefined ? _rascunho[key] : (Number(el&&el.value)||0);
  const nv=Math.max(0, cur+delta);
  _rascunho[key]=nv; if(el) el.value=nv;
  // SEM validação durante edição — só ao salvar
}
function salvarPedido(data){
  const emp=getEmpresa(USER.empresaId); if(!emp) return;
  const id=pedidoId(emp.id, data);
  const existing=getPedido(emp.id, data) || {};
  const upd={ empresaId:emp.id, data, atualizadoEm:Date.now() };
  let qualquer=false, alteracoes=0, bloqueios=[];

  // Validação de alterações ANTES de salvar
  REFEICOES.forEach(r=>{
    if(!refLigada(emp, r.key)) return;
    if(!janelaAberta(r.key, data)) return;
    const el=document.getElementById('q-'+r.key);
    let q = _rascunho[r.key]!==undefined ? _rascunho[r.key] : (el? Number(el.value)||0 : 0);
    q=Math.max(0, Math.floor(q));
    const temPedidoAnterior = existing[r.key] && existing[r.key].status==='pedido';
    if(temPedidoAnterior && q !== (existing[r.key].qtd||0)){
      // é uma ALTERAÇÃO — valida
      const val = validaAlteracao(r.key, q, data);
      if(!val.ok && val.bloqueado){
        bloqueios.push(val.msg);
      }
    }
  });

  if(bloqueios.length>0){
    alert(bloqueios.join('\n\n'));
    return;
  }

  REFEICOES.forEach(r=>{
    if(!refLigada(emp, r.key)) return;
    if(!janelaAberta(r.key, data)){
      // mantém o que já existia para refeições fechadas
      if(existing[r.key]) upd[r.key]=existing[r.key];
      return;
    }
    const el=document.getElementById('q-'+r.key);
    let q = _rascunho[r.key]!==undefined ? _rascunho[r.key] : (el? Number(el.value)||0 : 0);
    q=Math.max(0, Math.floor(q));
    const temPedidoAnterior = existing[r.key] && existing[r.key].status==='pedido';
    const qtdAnterior = temPedidoAnterior ? (existing[r.key].qtd||0) : null;

    const campo = {
      qtd: q,
      status: 'pedido',
      por: USER.nome,
      em: Date.now()
    };
    if(temPedidoAnterior && q !== qtdAnterior){
      campo.jaAlterou=true;
      campo.qtdOriginal = existing[r.key].qtdOriginal || qtdAnterior;
      alteracoes++;
    } else if(!temPedidoAnterior){
      campo.qtdOriginal = q;
    } else {
      if(existing[r.key].qtdOriginal) campo.qtdOriginal = existing[r.key].qtdOriginal;
      if(existing[r.key].jaAlterou) campo.jaAlterou = existing[r.key].jaAlterou;
    }
    upd[r.key] = campo;
    qualquer=true;
  });
  if(!qualquer){ toast('Nada para confirmar','Todos os prazos deste dia já fecharam.',true); return; }

  db.collection('ped_pedidos').doc(id).set(upd, {merge:true})
    .then(()=>{
      const s=document.getElementById('ped-saved');
      let msgSaved='✓ Pedido confirmado e enviado para a cozinha.';
      let msgToast='Pedido confirmado';
      if(alteracoes>0){
        msgSaved='✓ Pedido alterado (1 de 1 alteração usada).';
        msgToast='Alteração confirmada';
      }
      if(s) s.textContent=msgSaved;
      toast(msgToast, emp.nome+' • '+fmtData(data));

      // Aviso após primeiro pedido (ou alteração)
      if(Object.keys(_rascunho).length>0 || alteracoes>0){
        setTimeout(()=>{
          const ref=REFEICOES.find(r=>refLigada(emp,r.key) && janelaAberta(r.key,data));
          if(ref){
            const prazo=prazoTexto(ref.key,data);
            toast('ℹ️ Próxima alteração','Você pode alterar este pedido UMA VEZ até '+prazo+', máximo ±10%. Mudanças maiores precisam de Clecio.');
          }
        }, 800);
      }
      _rascunho={};
    })
    .catch(e=>alert('Erro ao salvar: '+(e.code||e.message)));
}

function somaRefsPorDia(data){
  // retorna {cafe, almoco, lanche, jantar, valor} do dia
  const peds = DB.pedidos.filter(p=>p.data===data);
  let tot={cafe:0,almoco:0,lanche:0,jantar:0}, valor=0;
  peds.forEach(p=>{
    REFEICOES.forEach(r=>{
      if(p[r.key]) tot[r.key]+=(p[r.key].qtd||0);
      if(p[r.key] && refLigada(getEmpresa(p.empresaId), r.key)){
        const preco=precoRef(getEmpresa(p.empresaId), r.key);
        valor += (p[r.key].qtd||0) * preco;
      }
    });
  });
  return {cafe:tot.cafe,almoco:tot.almoco,lanche:tot.lanche,jantar:tot.jantar,total:tot.cafe+tot.almoco+tot.lanche+tot.jantar,valor};
}
function diasDoMes(aaaa_mm){
  const [aa,mm]=aaaa_mm.split('-');
  const dt=new Date(aa,mm-1,1);
  const dias=[]; while(dt.getMonth()===Number(mm)-1){ dias.push(ymd(dt)); dt.setDate(dt.getDate()+1); }
  return dias;
}
const FERIADOS_BR_2026=[
  '2026-01-01', // Ano Novo
  '2026-02-17', // Carnaval
  '2026-03-06', // Sexta-feira de Cinzas
  '2026-04-03', // Sexta-feira Santa
  '2026-04-21', // Tiradentes
  '2026-05-01', // Dia do Trabalho
  '2026-05-14', // Corpus Christi
  '2026-09-07', // Independência
  '2026-10-12', // Nossa Senhora Aparecida
  '2026-11-02', // Finados
  '2026-11-20', // Consciência Negra
  '2026-12-25'  // Natal
];
function ehDiaUtil(data){
  // retorna false se é fim de semana ou feriado
  const dt=parseYMD(data);
  const dow=dt.getDay(); // 0=dom, 6=sab
  if(dow===0 || dow===6) return false; // fim de semana
  if(FERIADOS_BR_2026.includes(data)) return false; // feriado
  return true;
}
function somaRefsMes(aaaa_mm){
  const dias=diasDoMes(aaaa_mm);
  let tot={cafe:0,almoco:0,lanche:0,jantar:0,valor:0};
  let diasUteis=0;
  dias.forEach(d=>{
    const s=somaRefsPorDia(d);
    tot.cafe+=s.cafe; tot.almoco+=s.almoco; tot.lanche+=s.lanche; tot.jantar+=s.jantar; tot.valor+=s.valor;
    if(ehDiaUtil(d)) diasUteis++;
  });
  tot.total=tot.cafe+tot.almoco+tot.lanche+tot.jantar;
  tot.media=(diasUteis>0 ? (tot.total/diasUteis).toFixed(1) : '0'); // média só de dias úteis
  tot.diasUteis=diasUteis;
  return tot;
}
function crescimentoMes(aaaa_mm){
  // compara com mês anterior
  const dt=new Date(aaaa_mm+'-01');
  dt.setMonth(dt.getMonth()-1);
  const mesAnt=ymd(dt).slice(0,7);
  const atual=somaRefsMes(aaaa_mm);
  const ant=somaRefsMes(mesAnt);
  if(ant.total===0) return {pct:0,msg:'Sem dados do mês anterior'};
  const pct=((atual.total-ant.total)/ant.total*100).toFixed(1);
  return {pct,msg:pct>0?'📈 +'+pct+'%':pct<0?'📉 '+pct+'%':'➡️ 0%'};
}
function rankingEmpresas(aaaa_mm){
  const dias=diasDoMes(aaaa_mm);
  const rank={};
  DB.pedidos.filter(p=>diasDoMes(aaaa_mm).includes(p.data)).forEach(p=>{
    if(!rank[p.empresaId]) rank[p.empresaId]={nome:'',total:0,valor:0};
    const emp=getEmpresa(p.empresaId);
    rank[p.empresaId].nome=emp?emp.nome:'?';
    REFEICOES.forEach(r=>{
      if(p[r.key]){
        rank[p.empresaId].total+=(p[r.key].qtd||0);
        if(emp && refLigada(emp,r.key)){
          const preco=precoRef(emp,r.key);
          rank[p.empresaId].valor+=(p[r.key].qtd||0)*preco;
        }
      }
    });
  });
  return Object.entries(rank).map(([id,d])=>({id,...d})).sort((a,b)=>b.total-a.total);
}

function ultimoPedidoDe(empresaId){
  // retorna o dia do último pedido (YYYY-MM-DD) ou null
  const ped=DB.pedidos.filter(p=>p.empresaId===empresaId).sort((a,b)=>b.data.localeCompare(a.data))[0];
  return ped?ped.data:null;
}
function empresasAtivasNoMes(mes){
  // retorna empresas que pediram no mês OU pediram há menos de 30 dias
  const hjStr=ymd(hoje());
  const dt30=new Date(hoje());
  dt30.setDate(dt30.getDate()-30);
  const dias30aAtras=ymd(dt30);
  return DB.empresas.filter(e=>{
    if(e.ativo===false) return false; // já marcada como inativa
    const ult=ultimoPedidoDe(e.id);
    if(!ult) return false; // nunca pediu
    // pediu no mês OU pediu há menos de 30 dias
    return ult>=mes+'-01' || ult>=dias30aAtras;
  });
}

  const qtdAtual = ped && ped[refKey] ? (ped[refKey].qtd||0) : 0;
  const refNome=REF_BY[refKey].nome;
  const novaQtd=prompt(`Editar ${refNome} de ${esc(emp.nome)} em ${fmtData(data)}\n\nQuantidade atual: ${qtdAtual}\nNova quantidade:`, qtdAtual);
  if(novaQtd===null) return;
  const q=Math.max(0, Math.floor(Number(novaQtd)||0));
  const pedId=pedidoId(empresaId, data);
  db.collection('ped_pedidos').doc(pedId).set({
    empresaId, data, atualizadoEm: Date.now(),
    [refKey]: { qtd:q, status:'pedido', por:USER.nome, em:Date.now() }
  }, {merge:true}).then(()=>{
    toast('Editado', refNome+': '+q+' unidades');
    render();
  }).catch(e=>alert('Erro: '+(e.code||e.message)));
}

/* =====================================================================
   COZINHA — CARDÁPIO & PERCAPTA (base do checklist de produção)
===================================================================== */
const DIAS_SEMANA=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const CARD_GRUPOS=['TikTok','Casa','Base Aérea'];
function dowOf(data){ return parseYMD(data).getDay(); }
function cardapioGrupoDe(emp){
  if(!emp) return 'Casa';
  if(emp.cardapioGrupo) return emp.cardapioGrupo;
  if((emp.grupo||'').toLowerCase()==='tiktok') return 'TikTok';
  if(/base a[eé]rea/i.test((emp.nome||'')+' '+(emp.grupo||''))) return 'Base Aérea';
  return 'Casa';
}
function cardId(grupo,ref,dow){ return grupo+'__'+ref+'__'+dow; }
function getCardapio(grupo,ref,dow){ return (DB.cardapios||[]).find(c=>c.grupo===grupo&&c.ref===ref&&Number(c.dow)===Number(dow))||null; }
function fmtQtdProd(percapta,unidade,pessoas){
  const tot=(Number(percapta)||0)*(Number(pessoas)||0);
  if(unidade==='un') return Math.round(tot)+' un';
  if(tot>=1000) return (tot/1000).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' kg';
  return Math.round(tot)+' g';
}
const CARD_SEED={
  almoco:[{nome:'Proteína 1',percapta:75,unidade:'g'},{nome:'Proteína 2',percapta:75,unidade:'g'},{nome:'Arroz',percapta:180,unidade:'g'},{nome:'Feijão',percapta:120,unidade:'g'},{nome:'Guarnição',percapta:80,unidade:'g'},{nome:'Salada',percapta:60,unidade:'g'},{nome:'Farofa',percapta:25,unidade:'g'}],
  jantar:[{nome:'Proteína',percapta:75,unidade:'g'},{nome:'Arroz',percapta:180,unidade:'g'},{nome:'Feijão',percapta:120,unidade:'g'},{nome:'Guarnição',percapta:80,unidade:'g'},{nome:'Salada',percapta:60,unidade:'g'}],
  cafe:[{nome:'Pão',percapta:2,unidade:'un'},{nome:'Manteiga',percapta:15,unidade:'g'},{nome:'Café com leite',percapta:200,unidade:'g'},{nome:'Fruta',percapta:1,unidade:'un'}],
  lanche:[{nome:'Lanche',percapta:1,unidade:'un'},{nome:'Suco',percapta:200,unidade:'g'}]
};
const CARD_SEED_BASE={almoco:[{nome:'Proteína (280g carne/peixe/coxa · 250g suíno/peito frango)',percapta:280,unidade:'g'},{nome:'Arroz',percapta:200,unidade:'g'},{nome:'Feijão',percapta:130,unidade:'g'},{nome:'Guarnição',percapta:100,unidade:'g'},{nome:'Salada',percapta:70,unidade:'g'},{nome:'Farofa',percapta:30,unidade:'g'}]};
/* percapta PADRÃO (do ERP: 75g pronto/pessoa, Base Aérea 400g) — usada automaticamente quando não há cardápio salvo */
function cardapioPadrao(grupo, ref){
  const seed=(grupo==='Base Aérea'&&CARD_SEED_BASE[ref])?CARD_SEED_BASE[ref]:(CARD_SEED[ref]||[]);
  return seed.length ? {grupo, ref, itens:JSON.parse(JSON.stringify(seed)), padrao:true} : null;
}
let _cardSel={grupo:'TikTok',ref:'almoco',dow:(new Date().getDay())}, _cardDraft=null, _cardPessoas=100;
function cardLoadDraft(){ const c=getCardapio(_cardSel.grupo,_cardSel.ref,_cardSel.dow); if(c&&c.itens){ _cardDraft=JSON.parse(JSON.stringify(c.itens)); } else { const p=cardapioPadrao(_cardSel.grupo,_cardSel.ref); _cardDraft = p?p.itens:[]; } }
function viewCardapio(){
  if(_cardDraft===null) cardLoadDraft();
  const g=_cardSel.grupo, ref=_cardSel.ref, dow=_cardSel.dow, pessoas=_cardPessoas||0;
  const rows=_cardDraft.map((it,i)=>`<tr>
    <td><input value="${esc(it.nome||'')}" oninput="_cardDraft[${i}].nome=this.value" placeholder="ex: Frango grelhado" style="width:100%;min-width:150px;padding:7px 9px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)"></td>
    <td><input type="number" value="${it.percapta||0}" oninput="_cardDraft[${i}].percapta=Number(this.value)||0;cardPreview()" style="width:90px;padding:7px 9px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)"></td>
    <td><select onchange="_cardDraft[${i}].unidade=this.value;cardPreview()" style="padding:7px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)"><option value="g" ${it.unidade!=='un'?'selected':''}>g</option><option value="un" ${it.unidade==='un'?'selected':''}>un</option></select></td>
    <td class="num" id="cardprev-${i}" style="font-weight:700">${fmtQtdProd(it.percapta,it.unidade,pessoas)}</td>
    <td style="text-align:right"><button class="btn ghost sm" style="padding:4px 9px" onclick="_cardDraft.splice(${i},1);render()">✕</button></td>
  </tr>`).join('');
  return `<h2 class="page">Cardápio &amp; percapta</h2>
   <p class="sub">Defina os pratos e a <b>percapta</b> (quanto vai por pessoa, pronto) de cada dia. <b>Atualize toda semana</b> — vira o checklist de produção que sai na impressão do pedido. <span style="color:#fdba74">Percaptas provisórias; vamos calibrar com a média do ERP com o tempo.</span></p>
   <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px">
     <div class="field" style="margin:0;max-width:160px"><label>Grupo de cardápio</label><select onchange="cardSet('grupo',this.value)">${CARD_GRUPOS.map(x=>`<option ${x===g?'selected':''}>${x}</option>`).join('')}</select></div>
     <div class="field" style="margin:0;max-width:150px"><label>Dia da semana</label><select onchange="cardSet('dow',Number(this.value))">${DIAS_SEMANA.map((d,i)=>`<option value="${i}" ${i===dow?'selected':''}>${d}</option>`).join('')}</select></div>
     <div class="field" style="margin:0;max-width:140px"><label>Refeição</label><select onchange="cardSet('ref',this.value)">${REFEICOES.map(r=>`<option value="${r.key}" ${r.key===ref?'selected':''}>${r.nome}</option>`).join('')}</select></div>
     <div class="field" style="margin:0;max-width:130px"><label>Simular p/ pessoas</label><input type="number" value="${pessoas}" oninput="_cardPessoas=Number(this.value)||0;cardPreview()"></div>
   </div>
   <div class="card" style="padding:6px 6px 2px;overflow:auto">
     <table><thead><tr><th>Prato / item</th><th>Percapta</th><th>Un.</th><th class="num">Total p/ ${pessoas}</th><th></th></tr></thead>
     <tbody>${rows||'<tr><td colspan="5"><div class="empty">Sem itens ainda. Clique em <b>Preencher padrão</b> ou <b>+ Item</b>.</div></td></tr>'}</tbody></table>
   </div>
   <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
     <button class="btn sm" style="margin:0" onclick="cardAdd()">+ Item</button>
     <button class="btn ghost sm" style="margin:0" onclick="cardSeed()">Preencher padrão</button>
     <button class="btn sm" style="margin:0 0 0 auto" onclick="cardSave()">Salvar cardápio</button>
   </div>
   <p class="sub" style="margin-top:14px">Quais empresas usam este cardápio: as do grupo <b>${esc(g)}</b>. Você muda o grupo de uma empresa em <b>Empresas &amp; contratos</b> (campo "Grupo de cardápio").</p>`;
}
function cardSet(f,v){ _cardSel[f]=v; _cardDraft=null; render(); }
function cardAdd(){ if(_cardDraft===null)cardLoadDraft(); _cardDraft.push({nome:'',percapta:0,unidade:'g'}); render(); }
function cardSeed(){ const g=_cardSel.grupo,ref=_cardSel.ref; const seed=(g==='Base Aérea'&&CARD_SEED_BASE[ref])?CARD_SEED_BASE[ref]:(CARD_SEED[ref]||[]); _cardDraft=JSON.parse(JSON.stringify(seed)); render(); }
function cardPreview(){ const pessoas=_cardPessoas||0; (_cardDraft||[]).forEach((it,i)=>{ const el=document.getElementById('cardprev-'+i); if(el) el.textContent=fmtQtdProd(it.percapta,it.unidade,pessoas); }); }
function cardSave(){ const {grupo,ref,dow}=_cardSel; const itens=(_cardDraft||[]).filter(it=>(it.nome||'').trim());
  db.collection('ped_cardapios').doc(cardId(grupo,ref,dow)).set({grupo,ref,dow:Number(dow),itens,atualizadoEm:Date.now()})
   .then(()=>toast('Cardápio salvo', grupo+' • '+DIAS_SEMANA[dow]+' • '+REF_BY[ref].nome)).catch(e=>alert('Erro: '+(e.code||e.message))); }

/* COZINHA — IMPRESSÃO (ficha de expedição da cozinha) */
function fichaPedidoHTML(empId, data, skipEmpty){
  const emp=getEmpresa(empId); if(!emp) return '';
  const refs=REFEICOES.filter(r=>refLigada(emp,r.key));
  const ped=getPedido(emp.id, data);
  let totalRef=0, solicitante='', quando='';
  const linhas=refs.map(r=>{
    const ef=efetivo(emp.id, data, r.key); totalRef+=ef.qtd;
    if(ped && ped[r.key] && ped[r.key].status==='pedido'){ if(!solicitante) solicitante=ped[r.key].por||''; if(!quando && ped[r.key].em) quando=new Date(ped[r.key].em).toLocaleString('pt-BR'); }
    const origem = ef.origem==='pedido'?'Solicitado' : ef.origem==='auto'?'Repetido (auto)' : '—';
    return `<tr><td>${r.emoji} ${r.nome}</td><td class="q">${ef.qtd}</td><td>${origem}</td><td class="chk"></td></tr>`;
  }).join('');
  if(skipEmpty && totalRef===0) return '';
  // checklist de produção por refeição (percapta × pessoas), a partir do cardápio do grupo no dia da semana
  const grupoCard=cardapioGrupoDe(emp), dow=dowOf(data);
  let checklists='';
  refs.forEach(r=>{
    const ef=efetivo(emp.id, data, r.key); const pessoas=ef.qtd;
    if(pessoas<=0) return;
    const card=getCardapio(grupoCard, r.key, dow) || cardapioPadrao(grupoCard, r.key);
    if(!card || !card.itens || !card.itens.length) return;
    const itRows=card.itens.map(it=>`<tr><td>${esc(it.nome)}</td><td class="q2">${it.percapta} ${it.unidade==='un'?'un':'g'}/pes</td><td class="q">${fmtQtdProd(it.percapta,it.unidade,pessoas)}</td><td class="chk"></td></tr>`).join('');
    checklists+=`<div class="cl-bloco"><div class="cl-title">${r.emoji} ${r.nome} — ${pessoas} pessoas <span class="cl-g">(${esc(grupoCard)} · ${DIAS_SEMANA[dow]})</span></div>
      <table class="fitens cl"><thead><tr><th>Prato / item</th><th class="q2">Percapta</th><th class="q">Total</th><th class="chk">✔</th></tr></thead><tbody>${itRows}</tbody></table></div>`;
  });
  if(!checklists){ checklists='<div class="cl-none">Sem cardápio cadastrado para este dia/grupo — defina em <b>Cardápio &amp; percapta</b> para sair o checklist de produção.</div>'; }
  return `<div class="ficha">
    <div class="fh">
      <div><div class="fh-logo">TOTAL FOOD</div><div class="fh-sub">Pedido de produção · Ficha de expedição</div></div>
      <div style="text-align:right"><div class="fh-dia">${fmtData(data)}</div><div class="fh-sub">${esc(emp.nome)}${emp.grupo?' ('+esc(emp.grupo)+')':''}</div></div>
    </div>
    <div class="ftopo">
      <table class="finfo"><tbody>
        <tr><td><b>Resp:</b> ${esc(emp.responsavel||'—')}</td><td><b>Tel:</b> ${esc(emp.telefone||'—')}</td></tr>
        <tr><td colspan="2"><b>Solicitado por:</b> ${esc(solicitante||'—')}</td></tr>
      </tbody></table>
      <table class="fresumo"><thead><tr><th>Refeição</th><th class="q">Qtd</th><th>Origem</th></tr></thead>
        <tbody>${linhas||'<tr><td colspan="3">—</td></tr>'}</tbody>
        <tfoot><tr><td><b>TOTAL</b></td><td class="q"><b>${totalRef}</b></td><td></td></tr></tfoot></table>
    </div>
    <div class="cl-wrap">${checklists}</div>
    <div class="fbottom">
      <div class="fobs"><b>Obs:</b> <span class="line"></span></div>
      <div class="fass"><span>Conferido: <span class="line"></span></span><span>Saída: <span class="line"></span></span></div>
    </div>
    <div class="ffoot">${quando?'Solicitado em '+quando+' · ':''}Impresso ${new Date().toLocaleString('pt-BR')} · Urgência: ${RESP_PEDIDOS.nome} ${RESP_PEDIDOS.telExibe}</div>
  </div>`;
}
function imprimirPedido(empId, data){
  const h=fichaPedidoHTML(empId, data);
  if(!h){ alert('Empresa não encontrada.'); return; }
  document.getElementById('printArea').innerHTML=h; window.print();
}
function imprimirDia(data){
  const emps=DB.empresas.filter(e=>e.ativo!==false).slice()
    .sort((a,b)=>(a.grupo||'').localeCompare(b.grupo||'')||(a.nome||'').localeCompare(b.nome||''));
  const sheets=emps.map(e=>fichaPedidoHTML(e.id, data, true)).filter(Boolean).join('');
  if(!sheets){ alert('Nenhum pedido com refeições neste dia para imprimir.'); return; }
  document.getElementById('printArea').innerHTML=sheets; window.print();
}

   QUALIDADE — helpers compartilhados (opinião do cliente + gestão)
===================================================================== */
function fmtDate(s){ if(!s) return '—'; const p=String(s).slice(0,10).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s; }
function isMaster(){ return USER && USER.perfil==='cozinha'; }
function normEmpresa(s){ return (s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' '); }
function ocEmpresaNome(o){ if(!o) return '—'; if(o.empresaNome) return o.empresaNome; const e=getEmpresa(o.empresaId); return e?e.nome:'—'; }
function levenshtein(a,b){ a=a||'';b=b||'';const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=Array.from({length:n+1},(_,j)=>j),cur=new Array(n+1);
  for(let i=1;i<=m;i++){ cur[0]=i; for(let j=1;j<=n;j++){ cur[j]=a[i-1]===b[j-1]?prev[j-1]:1+Math.min(prev[j],cur[j-1],prev[j-1]); } [prev,cur]=[cur,prev]; }
  return prev[n]; }
function similar(a,b){ if(!a||!b)return false; if(a===b)return true;
  const min=Math.min(a.length,b.length),max=Math.max(a.length,b.length);
  if(min>=4&&(a.includes(b)||b.includes(a)))return true;
  return levenshtein(a,b) <= (max<=5?1:max<=10?2:3); }
function mesmaEmpresa(o,key){ return similar(normEmpresa(ocEmpresaNome(o)), key); }
/* empresas pro termômetro: âncoras = empresas cadastradas (ped_empresas) + nomes vindos das opiniões */
function empresasQualidade(){
  const groups=[];
  const acha=nome=>{ const k=normEmpresa(nome); for(const g of groups){ if(similar(g.id,k)) return g; } return null; };
  DB.empresas.filter(e=>e.ativo!==false).forEach(e=>{ const k=normEmpresa(e.nome); if(!k)return;
    if(!acha(e.nome)) groups.push({id:k, nome:e.nome, grupo:e.grupo||'', cadastrada:true}); });
  DB.ocorrencias.forEach(o=>{ const nome=ocEmpresaNome(o); if(!nome||nome==='—')return; if(!acha(nome)) groups.push({id:normEmpresa(nome), nome}); });
  groups.forEach(g=>{ const ocs=DB.ocorrencias.filter(o=>mesmaEmpresa(o,g.id)); g.total=ocs.length; g.reclamacoes=ocs.filter(o=>o.tipo==='Reclamação').length; });
  return groups.sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
}
function ocsOrdenadas(){ return DB.ocorrencias.slice().sort((a,b)=>(b.criadoEm||'').localeCompare(a.criadoEm||'')); }
function thermStatus(key){
  const since=Date.now()-86400000;
  const recl=DB.ocorrencias.filter(o=>mesmaEmpresa(o,key)&&o.tipo==='Reclamação');
  const last24=recl.filter(o=>new Date(o.criadoEm||o.data).getTime()>=since).length;
  const criticas=recl.filter(o=>o.urgencia==='Crítica'&&o.status!=='Resolvido'&&o.status!=='Encerrado').length;
  if(criticas>0||last24>=4) return {cls:'t-red',txt:'Crítico',msg:`${last24} reclamação(ões) em 24h`};
  if(last24>=2) return {cls:'t-orange',txt:'Recorrente',msg:`${last24} reclamações em 24h`};
  if(last24===1) return {cls:'t-yellow',txt:'Atenção',msg:'1 reclamação em 24h'};
  return {cls:'t-green',txt:'Normal',msg:'Sem reclamações recentes'};
}

/* mini-gráficos (SVG/divs, sem biblioteca) */
function barChart(labels,values,max){
  const m=max||Math.max(1,...values); const wrap=document.createElement('div'); wrap.className='bars';
  labels.forEach((l,i)=>{ const h=Math.round((values[i]/m)*130); const bar=document.createElement('div'); bar.className='bar';
    bar.innerHTML=`<div class="v">${values[i]}</div><div class="fill" style="height:${h}px"></div><div class="lbl">${l}</div>`; wrap.appendChild(bar); });
  return wrap;
}
function lineChart(labels,values,max){
  const W=480,H=170,P=28; const m=max||Math.max(1,...values);
  const xs=labels.map((_,i)=>P+i*((W-2*P)/(labels.length-1||1)));
  const ys=values.map(v=>H-P-(v/m)*(H-2*P)); const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg'); svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.classList.add('line-chart');
  [0,.25,.5,.75,1].forEach(f=>{const y=H-P-f*(H-2*P);const l=document.createElementNS(ns,'line');
    l.setAttribute('x1',P);l.setAttribute('x2',W-P);l.setAttribute('y1',y);l.setAttribute('y2',y);
    l.setAttribute('stroke','#233252');svg.appendChild(l);});
  const poly=document.createElementNS(ns,'polyline'); poly.setAttribute('points',xs.map((x,i)=>`${x},${ys[i]}`).join(' '));
  poly.setAttribute('fill','none'); poly.setAttribute('stroke','#8cc63e'); poly.setAttribute('stroke-width','3');
  poly.setAttribute('stroke-linejoin','round'); poly.setAttribute('stroke-linecap','round'); svg.appendChild(poly);
  xs.forEach((x,i)=>{const cc=document.createElementNS(ns,'circle');cc.setAttribute('cx',x);cc.setAttribute('cy',ys[i]);cc.setAttribute('r',4);cc.setAttribute('fill','#8cc63e');svg.appendChild(cc);
    const tx=document.createElementNS(ns,'text');tx.setAttribute('x',x);tx.setAttribute('y',H-8);tx.setAttribute('fill','#94a3b8');tx.setAttribute('font-size','10');tx.setAttribute('text-anchor','middle');tx.textContent=labels[i];svg.appendChild(tx);});
  return svg;
}

    status: isRecl?'Aberto':'Encerrado', responsavel:'', prazo:'', acao:'',
    por:USER.nome, origem:'cliente', criadoEm:new Date().toISOString() };
  db.collection('ocorrencias').add(o)
    .then(()=>{ document.getElementById('opi-desc').value='';
      toast(isRecl?'Reclamação enviada':TIPO_OPI+' enviada', 'A equipe da TOTAL FOOD foi avisada. Obrigado!'); render(); })
    .catch(e=>alert('Erro ao enviar: '+(e.code||e.message)));
}

/* =====================================================================
   COZINHA — QUALIDADE (gestão)
===================================================================== */
function viewQualidade(){
  const cls=empresasQualidade(); const ocs=ocsOrdenadas();
  const abertas=ocs.filter(o=>o.tipo==='Reclamação'&&(o.status==='Aberto'||o.status==='Em andamento')).length;
  const criticas=ocs.filter(o=>o.tipo==='Reclamação'&&o.urgencia==='Crítica'&&o.status!=='Resolvido'&&o.status!=='Encerrado').length;
  const elogios=ocs.filter(o=>o.tipo==='Elogio').length;
  return `<h2 class="page">Qualidade</h2>
   <p class="sub">Opiniões dos clientes em tempo real — chega aqui no mesmo instante em que o cliente envia.</p>
   <div class="grid kpis">
     ${kpiCard('Opiniões (total)', ocs.length)}
     ${kpiCard('Reclamações abertas', abertas, abertas>0?'down':'')}
     ${kpiCard('Críticas em aberto', criticas, criticas>0?'down':'')}
     ${kpiCard('Elogios', elogios, elogios>0?'up':'')}
   </div>
   <div class="section-title">🌡️ Termômetro por empresa</div>
   <div class="grid therm-grid">
     ${cls.length?cls.map(c=>{const t=thermStatus(c.id);return `<div class="therm"><div class="light ${t.cls}"></div>
       <div><div class="t-name">${esc(c.nome)}</div><div class="t-msg">${t.txt} — ${t.msg}</div></div></div>`}).join('')
       :'<div class="empty">Cadastre empresas e receba opiniões pra ver o termômetro.</div>'}
   </div>
   <div class="grid" style="grid-template-columns:1fr 1fr;margin-top:8px">
     <div class="card"><b>Reclamações (14 dias)</b><div id="qEvo"></div></div>
     <div class="card"><b>Opiniões por tipo</b><div id="qTipo"></div></div>
   </div>
   <div class="section-title">📨 Últimas opiniões</div>
   <div class="card" style="padding:6px 6px 2px;overflow:auto">${tabelaOc(ocs.slice(0,8))}</div>`;
}
function afterQualidade(){
  const ocs=ocsOrdenadas();
  const days=[]; for(let i=13;i>=0;i--) days.push(new Date(Date.now()-i*86400000).toISOString().slice(0,10));
  const reclByDay=days.map(d=>ocs.filter(o=>o.tipo==='Reclamação'&&((o.data||'')===d||(o.criadoEm||'').slice(0,10)===d)).length);
  const evo=document.getElementById('qEvo'); if(evo) evo.appendChild(lineChart(days.map(d=>d.slice(8,10)+'/'+d.slice(5,7)), reclByDay));
  const tipos=['Reclamação','Sugestão','Elogio','Solicitação'];
  const tp=document.getElementById('qTipo'); if(tp) tp.appendChild(barChart(tipos.map(t=>t.slice(0,4)+'.'), tipos.map(t=>ocs.filter(o=>o.tipo===t).length)));
}
function viewOcorrencias(){
  return `<h2 class="page">Ocorrências</h2>
   <p class="sub">Todas as opiniões dos clientes: reclamações, sugestões, elogios e solicitações.</p>
   <div class="card" style="padding:6px 6px 2px;overflow:auto">${tabelaOc(ocsOrdenadas(), true)}</div>`;
}
function viewPlanos(){
  const ocs=ocsOrdenadas().filter(o=>o.tipo==='Reclamação');
  const resp=DB.responsaveis.slice().sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  return `<h2 class="page">Planos de ação</h2>
   <p class="sub">Toda reclamação vira um plano: responsável, prazo (5 dias), ação tomada e indicador de feito.</p>
   <button class="btn ghost sm" onclick="document.getElementById('boxResp').classList.toggle('hidden')">👤 Responsáveis (${resp.length})</button>
   <div id="boxResp" class="card hidden" style="margin:14px 0">
     <b>Cadastrar responsável</b>
     <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
       <input id="nr-nome" placeholder="Nome do responsável" style="flex:1;min-width:180px;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)">
       <button class="btn sm" style="margin:0" onclick="salvarResponsavel()">Adicionar</button>
     </div>
     <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px">
       ${resp.length?resp.map(r=>`<span class="badge b-andamento" style="display:inline-flex;align-items:center;gap:6px">${esc(r.nome)} <a href="#" onclick="removerResponsavel('${r.id}');return false" style="color:#fca5a5;text-decoration:none">✕</a></span>`).join(''):'<span style="color:var(--muted);font-size:12px">Ninguém cadastrado ainda.</span>'}
     </div>
   </div>
   <div class="card" style="padding:6px 6px 2px;overflow:auto">
   <table><thead><tr><th>Empresa</th><th>Reclamação</th><th>Indicador</th><th>Responsável</th><th>Prazo</th><th>Ação tomada</th><th>Status</th></tr></thead>
   <tbody>${ocs.length?ocs.map(o=>{const ind=indicadorPlano(o);return `<tr>
     <td><b>${esc(ocEmpresaNome(o))}</b></td>
     <td><div style="white-space:normal;max-width:240px;line-height:1.4">${esc(o.descricao||'')}</div></td>
     <td><span class="badge ${ind.cls}">${ind.txt}</span></td>
     <td>${respSelect(o.id,o.responsavel)}</td>
     <td><input type="date" value="${prazoDe(o)}" onchange="setPlano('${o.id}','prazo',this.value)" style="padding:5px;border-radius:8px;background:var(--panel2);color:var(--txt);border:1px solid var(--line)"></td>
     <td><input value="${esc(o.acao||'')}" onchange="setPlano('${o.id}','acao',this.value)" placeholder="O que foi feito..." style="min-width:150px;padding:6px 8px;border-radius:8px;background:var(--panel2);color:var(--txt);border:1px solid var(--line)"></td>
     <td>${statusSelect(o.id,o.status)}</td></tr>`}).join(''):`<tr><td colspan="7" class="empty">Nenhuma reclamação registrada.</td></tr>`}</tbody></table></div>`;
}

/* =====================================================================
   UI helpers
===================================================================== */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(titulo, msg, warn){
  const t=document.createElement('div'); t.className='toast'+(warn?' warn':'');
  t.innerHTML=`<b>${esc(titulo)}</b><span>${esc(msg||'')}</span>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='.3s'; setTimeout(()=>t.remove(),300); }, 4200);
}
function openModal(html){ document.getElementById('modal-root').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ document.getElementById('modal-root').innerHTML=''; }

boot();
</script>
</body>
</html>
