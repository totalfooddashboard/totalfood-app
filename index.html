<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f766e">
<title>TOTAL FOOD — Pedidos & Qualidade</title>
<style>
  :root{
    --bg:#0b1120; --panel:#111a2e; --panel2:#16213a; --line:#233252;
    --txt:#e7ecf5; --muted:#94a3b8; --brand:#8cc63e; --brand2:#5e9e1f;
    --green:#22c55e; --yellow:#eab308; --orange:#f97316; --red:#ef4444;
    --blue:#3b82f6; --card-radius:16px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(820px 520px at 12% -12%, rgba(140,198,62,.20), transparent 60%),
      radial-gradient(760px 560px at 112% 8%, rgba(20,140,90,.16), transparent 55%),
      radial-gradient(900px 700px at 50% 120%, rgba(94,158,31,.12), transparent 60%),
      #070b14;
    color:var(--txt); -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:var(--brand)}
  .hidden{display:none!important}

  /* ---------- LOGIN ---------- */
  #login{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:430px;background:linear-gradient(180deg, rgba(22,33,58,.78), rgba(13,20,38,.82));
    border:1px solid rgba(255,255,255,.10); border-radius:26px; padding:38px 34px 30px;
    box-shadow:0 40px 90px -25px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px); position:relative; overflow:hidden}
  .login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, transparent, var(--brand), var(--brand2), transparent)}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo h1{font-size:18px;margin:0;line-height:1.1}
  .logo p{margin:0;font-size:12px;color:var(--muted)}
  /* selo da logo (alta qualidade) com brilho verde */
  .brand-wrap{position:relative;display:flex;justify-content:center;margin:6px 0 0}
  .brand-wrap::before{content:"";position:absolute;width:210px;height:210px;border-radius:50%;top:-34px;
    background:radial-gradient(circle, rgba(140,198,62,.40), transparent 68%);filter:blur(26px);pointer-events:none}
  .brand-badge{width:148px;height:148px;position:relative;z-index:2;
    background:linear-gradient(180deg,#ffffff,#f1f5ec);border-radius:32px;
    display:flex;align-items:center;justify-content:center;padding:20px;
    box-shadow:0 22px 48px -12px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.5) inset, 0 0 0 6px rgba(140,198,62,.12)}
  .brand-badge img{max-width:100%;max-height:100%;object-fit:contain}
  .brand-badge-sm{width:34px;height:34px;border-radius:9px;background:#fff;display:flex;align-items:center;
    justify-content:center;padding:4px;flex-shrink:0}
  .brand-badge-sm img{max-width:100%;max-height:100%;object-fit:contain}
  .eyebrow{text-align:center;color:var(--brand);font-size:11.5px;font-weight:800;letter-spacing:3.5px;
    text-transform:uppercase;margin-top:22px}
  .access-title{text-align:center;margin:6px 0 2px;font-size:28px;font-weight:800;letter-spacing:-.5px;
    background:linear-gradient(180deg,#ffffff,#cfe6b3);-webkit-background-clip:text;background-clip:text;color:transparent}
  .team-access{position:fixed;top:16px;right:16px;z-index:50;width:44px;height:44px;border-radius:12px;
    background:rgba(17,26,46,.85);border:1px solid var(--line);color:var(--muted);font-size:18px;cursor:pointer;
    backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center}
  .team-access:hover{color:var(--txt);border-color:var(--brand)}
  .access-sub{text-align:center;margin:0 auto;color:var(--muted);font-size:12.5px;max-width:300px;line-height:1.5}
  .trust{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:14px 0 2px}
  .trust span{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
    padding:4px 10px;border-radius:999px}
  .field{margin-top:16px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:12px 14px;border-radius:10px;
    border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:15px;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand)}
  .btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    color:#06210a;font-weight:800;font-size:15px;margin-top:20px;transition:.18s;
    box-shadow:0 12px 26px -10px rgba(140,198,62,.6)}
  .btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 16px 32px -10px rgba(140,198,62,.7)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt);font-weight:600}
  .btn.sm{width:auto;padding:9px 14px;margin:0;font-size:13px}
  .demo-users{margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
  .demo-users h4{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:0 0 10px}
  .demo-chip{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:10px 12px;margin-bottom:8px;color:var(--txt);font-size:13px}
  .demo-chip:hover{border-color:var(--brand)}
  .demo-chip b{color:var(--brand)}
  .err{color:var(--red);font-size:13px;margin-top:10px;min-height:16px}

  /* ---------- APP SHELL ---------- */
  #app{display:none;min-height:100%}
  .topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
    padding:12px 18px;background:rgba(11,17,32,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .topbar .mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),var(--brand2));
    display:flex;align-items:center;justify-content:center;font-weight:800;color:#042}
  .topbar .who{margin-left:auto;text-align:right;font-size:13px}
  .topbar .who b{display:block}
  .topbar .who span{color:var(--muted);font-size:12px}
  .topbar .live{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .layout{display:flex}
  .nav{width:230px;flex-shrink:0;padding:16px 12px;border-right:1px solid var(--line);min-height:calc(100vh - 59px)}
  .nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:transparent;
    border:none;color:var(--muted);padding:11px 12px;border-radius:10px;font-size:14px;margin-bottom:4px}
  .nav button:hover{background:var(--panel)}
  .nav button.active{background:var(--panel);color:var(--txt);font-weight:600;box-shadow:inset 3px 0 0 var(--brand)}
  .nav .ico{width:20px;text-align:center}
  .content{flex:1;padding:24px;max-width:1200px}
  h2.page{margin:0 0 4px;font-size:22px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 20px}

  /* KPI cards */
  .grid{display:grid;gap:16px}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--card-radius);padding:18px}
  .kpi .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .kpi .val{font-size:30px;font-weight:800;margin-top:6px}
  .kpi .val small{font-size:14px;color:var(--muted);font-weight:500}
  .kpi .trend{font-size:12px;margin-top:4px}
  .up{color:var(--green)} .down{color:var(--red)}

  /* thermometer */
  .therm-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .therm{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;border:1px solid var(--line);background:var(--panel)}
  .therm .light{width:46px;height:46px;border-radius:50%;flex-shrink:0;box-shadow:0 0 18px -2px}
  .therm .t-green{background:var(--green);box-shadow:0 0 18px -2px var(--green)}
  .therm .t-yellow{background:var(--yellow);box-shadow:0 0 18px -2px var(--yellow)}
  .therm .t-orange{background:var(--orange);box-shadow:0 0 18px -2px var(--orange)}
  .therm .t-red{background:var(--red);box-shadow:0 0 18px -2px var(--red)}
  .therm .t-name{font-weight:700}
  .therm .t-msg{font-size:12px;color:var(--muted);margin-top:3px}

  /* tables / lists */
  .section-title{font-size:15px;font-weight:700;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.4px}
  tr:hover td{background:var(--panel2)}
  .badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .b-baixa{background:rgba(34,197,94,.15);color:#86efac}
  .b-media{background:rgba(234,179,8,.15);color:#fde047}
  .b-alta{background:rgba(249,115,22,.16);color:#fdba74}
  .b-critica{background:rgba(239,68,68,.16);color:#fca5a5}
  .b-aberto{background:rgba(239,68,68,.14);color:#fca5a5}
  .b-andamento{background:rgba(59,130,246,.16);color:#93c5fd}
  .b-resolvido{background:rgba(34,197,94,.15);color:#86efac}
  .b-encerrado{background:rgba(148,163,184,.16);color:#cbd5e1}

  /* stars */
  .meal-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--card-radius);padding:18px;margin-bottom:16px}
  .meal-card h3{margin:0 0 2px;font-size:17px}
  .meal-card .when{color:var(--muted);font-size:12px;margin-bottom:14px}
  .rate-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line)}
  .rate-row:last-of-type{border-bottom:none}
  .rate-row .crit{font-size:14px}
  .stars{display:flex;gap:4px;font-size:24px;color:#3a4a66}
  .stars span{cursor:pointer;transition:transform .1s}
  .stars span:hover{transform:scale(1.15)}
  .stars span.on{color:#fbbf24}

  textarea{min-height:70px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .toast-wrap{position:fixed;top:14px;right:14px;z-index:100;display:flex;flex-direction:column;gap:10px;max-width:360px}
  .toast{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--brand);
    padding:13px 15px;border-radius:12px;box-shadow:var(--shadow);animation:slide .25s ease}
  .toast.crit{border-left-color:var(--red)}
  .toast b{display:block;font-size:13px;margin-bottom:2px}
  .toast small{color:var(--muted);font-size:12px}
  @keyframes slide{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

  .pill-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .pill-tabs button{background:var(--panel);border:1px solid var(--line);color:var(--muted);
    padding:8px 16px;border-radius:999px;font-size:13px}
  .pill-tabs button.active{background:var(--brand);color:#042;border-color:var(--brand);font-weight:700}

  /* simple bar chart */
  .bars{display:flex;align-items:flex-end;gap:10px;height:160px;padding-top:10px}
  .bars .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bars .bar .fill{width:100%;max-width:48px;background:linear-gradient(180deg,var(--brand),var(--brand2));border-radius:8px 8px 0 0;transition:height .4s}
  .bars .bar .lbl{font-size:11px;color:var(--muted)}
  .bars .bar .v{font-size:12px;font-weight:700}
  .line-chart{width:100%;height:170px}

  .empty{color:var(--muted);font-size:13px;padding:18px;text-align:center}
  .help-bar{background:linear-gradient(135deg,rgba(20,184,166,.12),rgba(15,118,110,.05));
    border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:13px;color:var(--muted);margin-bottom:20px}
  .help-bar b{color:var(--txt)}
  @media(max-width:820px){
    .nav{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;min-height:auto;display:flex;
      overflow-x:auto;border-right:none;border-top:1px solid var(--line);background:var(--panel);z-index:40;padding:6px}
    .nav button{flex-direction:column;font-size:10px;gap:3px;padding:8px 6px;min-width:64px}
    .nav button.active{box-shadow:inset 0 3px 0 var(--brand)}
    .content{padding:16px;padding-bottom:90px}
    .row2{grid-template-columns:1fr}
  }

  /* ---------- FLUXO PÚBLICO (FUNCIONÁRIO via QR/link) ---------- */
  #publico{display:none;min-height:100%}
  .pub-wrap{max-width:560px;margin:0 auto;padding:20px 18px 60px}
  .pub-top{display:flex;align-items:center;gap:12px;padding:14px 0 6px}
  .pub-top .mark{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#042}
  .pub-top b{font-size:15px} .pub-top span{display:block;color:var(--muted);font-size:12px}
  .steps{display:flex;gap:6px;margin:10px 0 22px}
  .steps .s{flex:1;height:6px;border-radius:99px;background:var(--line);transition:.3s}
  .steps .s.on{background:var(--brand)}
  .pub-q{font-size:20px;font-weight:800;margin:0 0 4px}
  .pub-help{color:var(--muted);font-size:13px;margin:0 0 18px}
  .choice{display:block;width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:16px;margin-bottom:10px;color:var(--txt);font-size:15px;font-weight:700;transition:.15s}
  .choice:hover{border-color:var(--brand);transform:translateY(-1px)}
  .choice .emo{font-size:20px;margin-right:8px}
  .choice small{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:4px}
  .check-row{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:13px 15px;margin-top:10px;cursor:pointer;font-size:14px}
  .check-row input{width:18px;height:18px;accent-color:var(--brand)}
  .pub-nav{display:flex;gap:10px;margin-top:22px}
  .pub-nav .btn{margin-top:0}
  .yn{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .yn button{padding:22px;border-radius:16px;border:1px solid var(--line);background:var(--panel);color:var(--txt);font-size:16px;font-weight:700}
  .yn button:hover{border-color:var(--brand)}
  .yn .emo{display:block;font-size:30px;margin-bottom:8px}
  .success-ico{width:78px;height:78px;border-radius:50%;background:rgba(34,197,94,.15);display:flex;align-items:center;justify-content:center;font-size:40px;margin:10px auto 16px}
  .wa{background:#0b141a;border:1px solid #1f2c34;border-radius:16px;padding:14px;margin:18px 0 0;
    background-image:linear-gradient(rgba(11,20,26,.96),rgba(11,20,26,.96))}
  .wa-head{display:flex;align-items:center;gap:9px;border-bottom:1px solid #1f2c34;padding-bottom:10px;margin-bottom:12px}
  .wa-head .av{width:34px;height:34px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;color:#04201c;font-weight:800}
  .wa-head b{font-size:13px;color:#e9edef} .wa-head span{font-size:11px;color:#8696a0}
  .wa-msg{background:#005c4b;color:#e9ffe9;padding:11px 13px;border-radius:12px;border-top-left-radius:3px;font-size:13px;line-height:1.55;max-width:90%}
  .wa-time{font-size:10px;color:#a7c3b8;text-align:right;margin-top:5px}
  .note{background:rgba(20,184,166,.08);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:12px;color:var(--muted);margin-top:16px}

  /* ---------- PEDIDOS ---------- */
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .b-ok{background:rgba(34,197,94,.15);color:#86efac}
  .b-auto{background:rgba(249,115,22,.16);color:#fdba74}
  .b-fechado{background:rgba(148,163,184,.15);color:#cbd5e1}
  .tag{font-size:11px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);padding:2px 8px;border-radius:6px;margin-left:6px}
  .hint{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5}.hint b{color:var(--txt)}
  .auto-note{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:#fdba74;border-radius:10px;padding:10px 12px;font-size:12.5px;margin-top:12px;line-height:1.5}
  .meal{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}
  .meal.closed{opacity:.92;border-style:dashed}
  .meal-head{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .meal-emoji{font-size:26px;width:44px;height:44px;border-radius:12px;background:var(--panel2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .meal-head h3{margin:0;font-size:17px}.meal-head .prazo{font-size:12px;color:var(--muted);margin-top:2px}
  .meal-status{margin-left:auto;text-align:right}
  .qty{display:flex;align-items:center;gap:10px;margin-top:14px}
  .qty button{width:48px;height:48px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:24px;font-weight:700;line-height:1}
  .qty button:hover{border-color:var(--brand)}
  .qty input{width:110px;height:48px;text-align:center;font-size:24px;font-weight:800;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  .qty .unit{color:var(--muted);font-size:13px}.qty input:disabled,.qty button:disabled{opacity:.5;cursor:not-allowed}
  .save-bar{position:sticky;bottom:0;background:linear-gradient(180deg,rgba(11,17,32,0),var(--bg) 40%);padding:16px 0 4px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .save-bar .saved{color:var(--green);font-size:13px}
  .datebar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .datebar .lbl{font-size:13px;color:var(--muted)}
  .datebar input[type=date]{padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:14px}
  .pill-day{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px}.pill-day b{color:var(--brand)}
  .urgente{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.04));border:1px solid rgba(239,68,68,.35);border-radius:14px;padding:16px;margin-top:8px}
  .urgente .ic{font-size:26px}.urgente b{color:#fca5a5}.urgente .call{margin-left:auto}
  .call-btn{display:inline-flex;align-items:center;gap:8px;background:#22c55e;color:#042;font-weight:700;text-decoration:none;padding:11px 16px;border-radius:10px;font-size:14px;white-space:nowrap}
  .modal-bg{position:fixed;inset:0;background:rgba(2,6,16,.7);display:flex;align-items:center;justify-content:center;z-index:90;padding:20px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow:auto;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 4px;font-size:18px}.modal .sub{margin-bottom:16px}
  .price-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.price-grid .field{margin-top:0}
  .opi-choice.sel{border-color:var(--brand)}
  /* impressão (ficha de expedição) */
  #printArea{display:none}
  .ficha{color:#000;background:#fff;font-family:Arial,Helvetica,sans-serif;padding:14px 6px}
  .ficha .fh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #000;padding-bottom:8px;margin-bottom:10px}
  .ficha .fh-logo{font-size:24px;font-weight:800;letter-spacing:.5px}.ficha .fh-sub{font-size:11px;color:#444}.ficha .fh-dia{font-size:18px;font-weight:800}

function normEmpresa(s){ return (s||'').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' '); }
function ocEmpresaNome(o){ return (o&&o.empresaNome) || ((DB.clientes.find(c=>c.id===(o&&o.clienteId))||{}).nomeFantasia) || '—'; }

/* similaridade de nomes — agrupa "Moura Doubex" e "Moura Dubeux" como a mesma empresa */
function levenshtein(a,b){
  a=a||''; b=b||''; const m=a.length, n=b.length;
  if(!m) return n; if(!n) return m;
  let prev=Array.from({length:n+1},(_,j)=>j), cur=new Array(n+1);
  for(let i=1;i<=m;i++){ cur[0]=i;
    for(let j=1;j<=n;j++){ cur[j]= a[i-1]===b[j-1] ? prev[j-1] : 1+Math.min(prev[j],cur[j-1],prev[j-1]); }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function similar(a,b){
  if(!a||!b) return false; if(a===b) return true;
  const min=Math.min(a.length,b.length), max=Math.max(a.length,b.length);
  if(min>=4 && (a.includes(b)||b.includes(a))) return true;
  const d=levenshtein(a,b);
  return d <= (max<=5?1 : max<=10?2 : 3);
}
function mesmaEmpresa(o, key){ return similar(normEmpresa(ocEmpresaNome(o)), key); }

/* Empresas agrupadas: nomes parecidos viram UMA empresa só, com contagem de reclamações.
   Cadastrados (em Clientes) são as âncoras com o nome oficial. Nada exposto no link público. */
function visibleClientes(){
  const groups=[];
  const acha = nome => { const k=normEmpresa(nome); for(const g of groups){ if(similar(g.id,k)) return g; } return null; };
  DB.clientes.forEach(c=>{ const k=normEmpresa(c.nomeFantasia); if(!k) return; const g=acha(c.nomeFantasia);
    if(g && !g.cadastrado){ Object.assign(g, c, {id:g.id, docId:c.id, cadastrado:true}); }
    else if(!g){ groups.push(Object.assign({}, c, {id:k, docId:c.id, cadastrado:true})); } });
  DB.ocorrencias.forEach(o=>{ const nome=ocEmpresaNome(o); if(!nome||nome==='—') return; if(!acha(nome)) groups.push({id:normEmpresa(nome), nomeFantasia:nome, status:'Ativo'}); });
  groups.forEach(g=>{ const ocs=DB.ocorrencias.filter(o=> mesmaEmpresa(o, g.id)); g.total=ocs.length; g.reclamacoes=ocs.filter(o=>o.tipo==='Reclamação').length; });
  return groups.sort((a,b)=>(a.nomeFantasia||'').localeCompare(b.nomeFantasia||''));
}

/* ============================================================
   MÉTRICAS
============================================================ */
function mediaSatisfacao(avs){
  if(!avs.length) return 0;
  let soma=0,n=0;
  avs.forEach(a=>Object.values(a.notas).forEach(v=>{soma+=v;n++;}));
  return n? (soma/n) : 0;
}
function nps(avs){
  // aproximação: notas médias por avaliação → promotor(>=4.5), detrator(<3)
  if(!avs.length) return 0;
  let p=0,d=0;
  avs.forEach(a=>{const vs=Object.values(a.notas); const m=vs.reduce((x,y)=>x+y,0)/vs.length;
    if(m>=4.5)p++; else if(m<3)d++;});
  return Math.round(((p-d)/avs.length)*100);
}
function thermStatus(empresaKey){
  const since = Date.now()-86400000;
  const recl = DB.ocorrencias.filter(o=> mesmaEmpresa(o, empresaKey) && o.tipo==='Reclamação');
  const last24 = recl.filter(o=> new Date(o.criadoEm||o.data).getTime()>=since).length;
  const criticas = recl.filter(o=>o.urgencia==='Crítica' && o.status!=='Resolvido' && o.status!=='Encerrado').length;
  if(criticas>0 || last24>=4) return {cls:'t-red', txt:'Crítico', msg:`${last24} reclamações nas últimas 24h`};
  if(last24>=2) return {cls:'t-orange', txt:'Problema recorrente', msg:`${last24} reclamações nas últimas 24h`};
  if(last24===1) return {cls:'t-yellow', txt:'Atenção', msg:'1 reclamação nas últimas 24h'};
  return {cls:'t-green', txt:'Situação normal', msg:'Sem reclamações recentes'};
}

AFTER.graficos = function(){
  const ocs=visibleOcorrencias();
  // evolução das reclamações (14 dias)
  const days=[]; for(let i=13;i>=0;i--){ days.push(new Date(Date.now()-i*86400000).toISOString().slice(0,10)); }
  const reclByDay = days.map(day=> ocs.filter(o=>o.tipo==='Reclamação' && ((o.data||'')===day || (o.criadoEm||'').slice(0,10)===day)).length);
  document.getElementById('chartEvo').appendChild(lineChart(days.map(d=>d.slice(8,10)+'/'+d.slice(5,7)), reclByDay));
  // ocorrências por tipo
  const tipos=['Reclamação','Sugestão','Elogio','Solicitação','Indicação'];
  document.getElementById('chartOc').appendChild(barChart(tipos.map(t=>t.slice(0,4)+'.'), tipos.map(t=>ocs.filter(o=>o.tipo===t).length)));
  // ranking empresas com mais reclamações
  const cls=visibleClientes();
  const rank = cls.map(c=>({nome:c.nomeFantasia, n: ocs.filter(o=>o.tipo==='Reclamação' && mesmaEmpresa(o, c.id)).length}))
    .filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,8);
  const rk=document.getElementById('chartRank');
  if(rank.length) rk.appendChild(barChart(rank.map(r=>(r.nome||'').split(' ')[0]), rank.map(r=>r.n)));
  else rk.innerHTML='<div class="empty">Sem reclamações ainda.</div>';
};

function mudarStatus(id,v){
  if(v==='Encerrado' && !isMaster()){ alert('Só o Diretor (senha master) pode ENCERRAR uma ocorrência.'); render(); return; }
  const upd={status:v};

/* ---- Planos de ação: prazo (5 dias), indicador, responsável ---- */
function prazoDe(o){ if(o.prazo) return o.prazo; const b=new Date(o.criadoEm||o.data||Date.now()); b.setDate(b.getDate()+5); return b.toISOString().slice(0,10); }
function indicadorPlano(o){
  if(o.status==='Resolvido'||o.status==='Encerrado') return {txt:'✅ Feito', cls:'b-resolvido'};
  const prazo=new Date(prazoDe(o)+'T23:59:59');
  if(prazo < new Date()) return {txt:'🔴 Atrasado', cls:'b-aberto'};
  return {txt:'🟡 No prazo', cls:'b-andamento'};
}
function respSelect(id, cur){
  if(!isMaster()) return `<span style="font-size:13px">${cur||'<span style="color:var(--muted)">— a definir —</span>'}</span>`;
  const nomes = [...new Set([...DB.usuarios.map(u=>u.nome), ...DB.responsaveis.map(r=>r.nome)].filter(Boolean))].sort((a,b)=>a.localeCompare(b));

}

function enviarAvaliacao(ref){
  const card=document.querySelector(`.meal-card[data-ref="${ref}"]`);
  const stars=card.querySelectorAll('.stars');
  const notas={}; let preenchidas=0;
  stars.forEach(s=>{const v=+(s.dataset.value||0); notas[s.dataset.crit]=v; if(v>0)preenchidas++;});
  if(preenchidas===0){ alert('Toque nas estrelas pra avaliar pelo menos um item.'); return; }
  const obs=card.querySelector(`[data-obs="${ref}"]`).value;
  if(jaAvaliouHoje()){ alert('Você já enviou sua avaliação de hoje. Volte amanhã. (Pra avisar algo agora, use "Dar opinião".)'); render(); return; }
  const av={clienteId:USER.clienteId||'', empresaNome:USER.empresaNome||'', email:USER.email||'', data:new Date().toISOString(), dia:ymd(new Date()), refeicao:ref, notas, obs, por:USER.nome};
  db.collection('avaliacoes').add(av).then(()=>{ _avaliouHojeData=ymd(new Date()); render(); }).catch(e=>alert('Erro ao enviar: '+(e.code||e.message)));
  const media=(Object.values(notas).filter(v=>v>0).reduce((a,b)=>a+b,0)/preenchidas);
  toast(`Avaliação enviada — ${ref}`, `Média ${media.toFixed(1)}★. Obrigado!`);
  if(media<3) toast('⚠️ Avaliação baixa detectada', `${(USER.empresaNome||"Cliente")} avaliou o ${ref.toLowerCase()} com ${media.toFixed(1)}★`, true);
  // reset
  stars.forEach(s=>{s.dataset.value=0;[...s.children].forEach(c=>c.classList.remove('on'));});
  card.querySelector(`[data-obs="${ref}"]`).value='';
}

  }

/* corrige/encaixa o nome digitado no nome oficial mais parecido das empresas cadastradas */
function matchEmpresa(typed){
  const t = normEmpresa(typed); if(!t) return typed;
  const nomes = DB.clientes.map(c=>c.nomeFantasia).filter(Boolean);
  let best=null, bestScore=0;
  nomes.forEach(nome=>{
    const n = normEmpresa(nome); let score=0;
    if(n===t) score=100;
    else if(n.includes(t) || t.includes(n)) score=82 - Math.abs(n.length-t.length);
    else { const len=Math.max(n.length,t.length); let common=0; for(let i=0;i<Math.min(n.length,t.length);i++){ if(n[i]===t[i]) common++; } score=(common/len)*62; }
    if(score>bestScore){ bestScore=score; best=nome; }
  });
  return (bestScore>=62 && best) ? best : typed;
}

/* ============================================================
   IA (demonstração por regras)
============================================================ */
function gerarInsightsIA(ocs, avs){
  const out=[];
  const recl = ocs.filter(o=>o.tipo==='Reclamação');
  const abertas = recl.filter(o=>o.status!=='Resolvido' && o.status!=='Encerrado');
  const since24=Date.now()-86400000, since7=Date.now()-7*86400000;
  const ult24 = recl.filter(o=>new Date(o.criadoEm||o.data).getTime()>=since24).length;
  const ult7 = recl.filter(o=>new Date(o.criadoEm||o.data).getTime()>=since7).length;
  const semResp = abertas.filter(o=>!o.responsavel).length;
  const retornoPend = ocs.filter(o=>o.querRetorno && o.retorno!=='respondido' && o.retorno!=='nao').length;
  const sugest = ocs.filter(o=>o.tipo==='Sugestão').length;
  const elog = ocs.filter(o=>o.tipo==='Elogio').length;

  // resumo principal — reflete a realidade
  if(abertas.length===0 && retornoPend===0){
    out.push({cor:'var(--green)',titulo:'✅ Sem pendências no momento',
      texto:`Nenhuma reclamação em aberto e nenhum retorno pendente. ${recl.length} reclamação(ões) no histórico, todas já tratadas.`});
  } else {
    out.push({cor:'var(--orange)',titulo:`📋 ${abertas.length} reclamação(ões) em aberto`,
      texto:`${ult24} nas últimas 24h · ${ult7} nos últimos 7 dias.${semResp>0?' '+semResp+' ainda SEM responsável definido.':''} Acompanhe na aba Planos de ação.`});
  }

  // retornos pendentes
  if(retornoPend>0) out.push({cor:'var(--red)',titulo:`📱 ${retornoPend} pessoa(s) esperando retorno`,
    texto:`Pediram retorno e ainda não foram respondidas. Responda pelo WhatsApp na aba Ocorrências antes do prazo de 2 dias.`});

  // empresa em risco (pico de reclamações)
  visibleClientes().forEach(c=>{
    const last24=ocs.filter(o=>mesmaEmpresa(o,c.id) && o.tipo==='Reclamação' && new Date(o.criadoEm||o.data).getTime()>=since24).length;
    if(last24>=3) out.push({cor:'var(--red)',titulo:`⚠️ ${c.nomeFantasia} em risco`,
      texto:`${last24} reclamações nas últimas 24h — padrão de cliente que pode abrir disputa de contrato. Vale contato do supervisor hoje.`});
  });

  // causa mais frequente
  const causas={};
  recl.forEach(o=>{ if(o.tipoReclamacao) causas[o.tipoReclamacao]=(causas[o.tipoReclamacao]||0)+1; });
  const top=Object.entries(causas).sort((a,b)=>b[1]-a[1])[0];
  if(top && top[1]>=2) out.push({cor:'var(--blue)',titulo:'🔍 Causa mais frequente: '+top[0],
    texto:`"${top[0]}" aparece em ${top[1]} reclamações. Uma ação preventiva nesse ponto reduz o volume.`});

  // satisfação (quando houver avaliações por estrelas)
  const m=mediaSatisfacao(avs);
  if(avs.length && m<3.5) out.push({cor:'var(--orange)',titulo:'📉 Satisfação abaixo da meta',
    texto:`Média em ${m.toFixed(1)}/5. Revise os itens mais mal avaliados.`});

  // lado positivo
  if(elog>0 || sugest>0) out.push({cor:'var(--green)',titulo:`🌟 ${elog} elogio(s) · ${sugest} sugestão(ões)`,
    texto:`Use os elogios pra reconhecer a equipe e as sugestões pra evoluir o cardápio.`});

  return out;
}

/* ============================================================
   GRÁFICOS (SVG puro, sem dependências)
============================================================ */
function barChart(labels, values, max){
  const m = max || Math.max(1,...values);
  const wrap=document.createElement('div'); wrap.className='bars';
  labels.forEach((l,i)=>{
    const h=Math.round((values[i]/m)*130);
    const bar=document.createElement('div'); bar.className='bar';
    bar.innerHTML=`<div class="v">${values[i]}</div><div class="fill" style="height:${h}px"></div><div class="lbl">${l}</div>`;
    wrap.appendChild(bar);
  });
  return wrap;
}
function lineChart(labels, values, max){
  const W=480,H=170,P=28; const m=max||Math.max(1,...values);
  const xs=labels.map((_,i)=>P+i*((W-2*P)/(labels.length-1||1)));
  const ys=values.map(v=>H-P-(v/m)*(H-2*P));
  const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg'); svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.classList.add('line-chart');
  [0,.25,.5,.75,1].forEach(f=>{const y=H-P-f*(H-2*P);const l=document.createElementNS(ns,'line');
    l.setAttribute('x1',P);l.setAttribute('x2',W-P);l.setAttribute('y1',y);l.setAttribute('y2',y);
    l.setAttribute('stroke','#233252');l.setAttribute('stroke-width','1');svg.appendChild(l);});
  const poly=document.createElementNS(ns,'polyline'); poly.setAttribute('points',pts);
  poly.setAttribute('fill','none'); poly.setAttribute('stroke','#14b8a6'); poly.setAttribute('stroke-width','3');
  poly.setAttribute('stroke-linejoin','round'); poly.setAttribute('stroke-linecap','round'); svg.appendChild(poly);
  xs.forEach((x,i)=>{const cc=document.createElementNS(ns,'circle');cc.setAttribute('cx',x);cc.setAttribute('cy',ys[i]);
    cc.setAttribute('r',4);cc.setAttribute('fill','#14b8a6');svg.appendChild(cc);
    const tx=document.createElementNS(ns,'text');tx.setAttribute('x',x);tx.setAttribute('y',H-8);
    tx.setAttribute('fill','#94a3b8');tx.setAttribute('font-size','10');tx.setAttribute('text-anchor','middle');
    tx.textContent=labels[i];svg.appendChild(tx);});
  return svg;
}

/* =====================================================================
   DATAS E PRAZOS
===================================================================== */
function hoje(){ return new Date(); }
function ymd(d){ const z=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }
function parseYMD(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y, m-1, d); }
function addDays(s, n){ const d=parseYMD(s); d.setDate(d.getDate()+n); return ymd(d); }
function fmtData(s){
  const d=parseYMD(s); const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const z=n=>String(n).padStart(2,'0');
  return dias[d.getDay()]+', '+z(d.getDate())+'/'+z(d.getMonth()+1);
}
function fmtDataCurta(s){ const d=parseYMD(s); const z=n=>String(n).padStart(2,'0'); return z(d.getDate())+'/'+z(d.getMonth()+1); }

/* instante em que FECHA o pedido de uma refeição para a data alvo */
function deadline(refKey, dataAlvo){
  const r=REF_BY[refKey];
  const base = r.diaAnterior ? parseYMD(addDays(dataAlvo,-1)) : parseYMD(dataAlvo);
  base.setHours(r.hora, 0, 0, 0);
  return base;
}
function janelaAberta(refKey, dataAlvo){ return hoje() < deadline(refKey, dataAlvo); }

/* primeira data futura que ainda tem ALGUMA janela aberta (default do pedido) */
function proximaDataPedido(){
  let d = ymd(hoje());
  for(let i=0;i<3;i++){
    const alvo = addDays(d, i);
    if(parseYMD(alvo) < parseYMD(ymd(hoje()))) continue;
    if(REFEICOES.some(r=> janelaAberta(r.key, alvo))) return alvo;
  }
  return addDays(ymd(hoje()),1);
}

/* =====================================================================
   MODELO DE PEDIDOS
===================================================================== */
function pedidoId(empresaId, data){ return empresaId+'__'+data; }
function getPedido(empresaId, data){ return DB.pedidos.find(p=> p.empresaId===empresaId && p.data===data) || null; }
function getEmpresa(id){ return DB.empresas.find(e=>e.id===id) || null; }

/* valor EFETIVO de uma refeição para a cozinha:
   - se houver pedido explícito -> usa, origem 'pedido'
   - senão repete o último pedido explícito de dias anteriores -> origem 'auto'
   - senão 0, origem 'sem' */
function efetivo(empresaId, data, refKey){
  const p=getPedido(empresaId, data);
  if(p && p[refKey] && p[refKey].status==='pedido'){
    return {qtd:Number(p[refKey].qtd)||0, origem:'pedido', por:p[refKey].por||'', refData:data};
  }
  // procurar dia anterior com pedido explícito (até 14 dias atrás)
  for(let i=1;i<=14;i++){
    const dAnt=addDays(data,-i);
    const pa=getPedido(empresaId, dAnt);
    if(pa && pa[refKey] && pa[refKey].status==='pedido'){
      return {qtd:Number(pa[refKey].qtd)||0, origem:'auto', refData:dAnt};
    }
  }
  // fallback: quantidade contratada da empresa
  const emp=getEmpresa(empresaId);
  const contr = emp && emp.ref && emp.ref[refKey] ? Number(emp.ref[refKey].qtd)||0 : 0;
  if(contr>0) return {qtd:contr, origem:'auto', refData:null, contrato:true};
  return {qtd:0, origem:'sem', refData:null};
}

function refLigada(emp, refKey){ return emp && emp.ref && emp.ref[refKey] && emp.ref[refKey].on; }
function precoRef(emp, refKey){ return emp && emp.ref && emp.ref[refKey] ? Number(emp.ref[refKey].preco)||0 : 0; }
function contratoRef(emp, refKey){ return emp && emp.ref && emp.ref[refKey] ? Number(emp.ref[refKey].qtd)||0 : 0; }

function brl(v){ return 'R$ '+(Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2}); }

function prazoTexto(refKey, data){
  const r=REF_BY[refKey];
  const dia = r.diaAnterior ? addDays(data,-1) : data;
  const quando = r.diaAnterior ? `${fmtDataCurta(dia)} (véspera)` : `${fmtDataCurta(dia)} (mesmo dia)`;
  return `${String(r.hora).padStart(2,'0')}:00 de ${quando}`;
}
function mudaDataPedido(v){ PEDIDO_DATA=v; _rascunho={}; render(); }
function setQty(key, v){ _rascunho[key]=Math.max(0, Math.floor(Number(v)||0)); }
function stepQty(key, delta){
  const el=document.getElementById('q-'+key);
  const cur = _rascunho[key]!==undefined ? _rascunho[key] : (Number(el&&el.value)||0);
  const nv=Math.max(0, cur+delta);
  _rascunho[key]=nv; if(el) el.value=nv;
}
function salvarPedido(data){
  const emp=getEmpresa(USER.empresaId); if(!emp) return;
  const id=pedidoId(emp.id, data);
  const existing=getPedido(emp.id, data) || {};
  const upd={ empresaId:emp.id, data, atualizadoEm:Date.now() };
  let qualquer=false;
  REFEICOES.forEach(r=>{
    if(!refLigada(emp, r.key)) return;
    if(!janelaAberta(r.key, data)){
      // mantém o que já existia para refeições fechadas
      if(existing[r.key]) upd[r.key]=existing[r.key];
      return;
    }
    const el=document.getElementById('q-'+r.key);
    let q = _rascunho[r.key]!==undefined ? _rascunho[r.key] : (el? Number(el.value)||0 : 0);
    q=Math.max(0, Math.floor(q));
    upd[r.key]={ qtd:q, status:'pedido', por:USER.nome, em:Date.now() };
    qualquer=true;
  });
  if(!qualquer){ toast('Nada para confirmar','Todos os prazos deste dia já fecharam.',true); return; }
  db.collection('ped_pedidos').doc(id).set(upd, {merge:true})
    .then(()=>{ const s=document.getElementById('ped-saved'); if(s) s.textContent='✓ Pedido confirmado e enviado para a cozinha.';
      toast('Pedido confirmado', emp.nome+' • '+fmtData(data)); _rascunho={}; })
    .catch(e=>alert('Erro ao salvar: '+(e.code||e.message)));
}

function dowOf(data){ return parseYMD(data).getDay(); }
function cardapioGrupoDe(emp){
  if(!emp) return 'Casa';
  if(emp.cardapioGrupo) return emp.cardapioGrupo;
  if((emp.grupo||'').toLowerCase()==='tiktok') return 'TikTok';
  if(/base a[eé]rea/i.test((emp.nome||'')+' '+(emp.grupo||''))) return 'Base Aérea';
  return 'Casa';
}

  const tot=(Number(percapta)||0)*(Number(pessoas)||0);
  if(unidade==='un') return Math.round(tot)+' un';
  if(tot>=1000) return (tot/1000).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' kg';
  return Math.round(tot)+' g';
}

  const refs=REFEICOES.filter(r=>refLigada(emp,r.key));

    if(ped && ped[r.key] && ped[r.key].status==='pedido'){ if(!solicitante) solicitante=ped[r.key].por||''; if(!quando && ped[r.key].em) quando=new Date(ped[r.key].em).toLocaleString('pt-BR'); }
    const origem = ef.origem==='pedido'?'Solicitado' : ef.origem==='auto'?'Repetido (auto)' : '—';
    return `<tr><td>${r.emoji} ${r.nome}</td><td class="q">${ef.qtd}</td><td>${origem}</td><td class="chk"></td></tr>`;
  }).join('');

  // checklist de produção por refeição (percapta × pessoas), a partir do cardápio do grupo no dia da semana
  const grupoCard=cardapioGrupoDe(emp), dow=dowOf(data);
  let checklists='';
  refs.forEach(r=>{
    const ef=efetivo(emp.id, data, r.key); const pessoas=ef.qtd;
    if(pessoas<=0) return;
    const card=getCardapio(grupoCard, r.key, dow) || cardapioPadrao(grupoCard, r.key);
    if(!card || !card.itens || !card.itens.length) return;
    const itRows=card.itens.map(it=>`<tr><td>${esc(it.nome)}</td><td class="q2">${it.percapta} ${it.unidade==='un'?'un':'g'}/pes</td><td class="q">${fmtQtdProd(it.percapta,it.unidade,pessoas)}</td><td class="chk"></td></tr>`).join('');
    checklists+=`<div class="cl-title">${r.emoji} ${r.nome} — produção para ${pessoas} pessoas <span class="cl-g">(${card.padrao?'percapta padrão':'cardápio'} ${esc(grupoCard)} · ${DIAS_SEMANA[dow]})</span></div>
      <table class="fitens cl"><thead><tr><th>Prato / item</th><th class="q2">Percapta</th><th class="q">Total a enviar</th><th class="chk">✔</th></tr></thead><tbody>${itRows}</tbody></table>`;
  });
  if(!checklists){ checklists='<div class="cl-none">Sem cardápio cadastrado para este dia/grupo — defina em <b>Cardápio &amp; percapta</b> para sair o checklist de produção.</div>'; }
  return `<div class="ficha">
    <div class="fh">
      <div><div class="fh-logo">TOTAL FOOD</div><div class="fh-sub">Pedido de produção · Ficha de expedição</div></div>
      <div style="text-align:right"><div class="fh-dia">${fmtData(data)}</div><div class="fh-sub">Produção do dia</div></div>
    </div>
    <table class="finfo"><tbody>
      <tr><td><b>Empresa:</b> ${esc(emp.nome)}${emp.grupo?' ('+esc(emp.grupo)+')':''}</td><td><b>Responsável:</b> ${esc(emp.responsavel||'—')}</td></tr>
      <tr><td><b>Contato:</b> ${esc(emp.telefone||'—')}</td><td><b>Solicitado por:</b> ${esc(solicitante||'—')}</td></tr>
    </tbody></table>
    <table class="fitens"><thead><tr><th>Refeição</th><th class="q">Qtd</th><th>Origem</th><th class="chk">Separado</th></tr></thead>
      <tbody>${linhas||'<tr><td colspan="4">Sem refeições no contrato.</td></tr>'}</tbody>
      <tfoot><tr><td><b>TOTAL DE REFEIÇÕES</b></td><td class="q"><b>${totalRef}</b></td><td colspan="2"></td></tr></tfoot></table>
    <div class="cl-wrap">${checklists}</div>
    <div class="fobs"><b>Observações:</b> <span class="line"></span></div>
    <div class="fass"><div>Conferido por: <span class="line2"></span></div><div>Hora de saída: <span class="line3"></span></div></div>
    <div class="ffoot">${quando?'Solicitação feita em '+quando+' · ':''}Impresso em ${new Date().toLocaleString('pt-BR')} · Urgência: ${RESP_PEDIDOS.nome} ${RESP_PEDIDOS.telExibe}</div>
  </div>`;
}
function imprimirPedido(empId, data){
  const h=fichaPedidoHTML(empId, data);

  document.getElementById('printArea').innerHTML=h; window.print();

function imprimirDia(data){
  const emps=DB.empresas.filter(e=>e.ativo!==false).slice()
    .sort((a,b)=>(a.grupo||'').localeCompare(b.grupo||'')||(a.nome||'').localeCompare(b.nome||''));
  const sheets=emps.map(e=>fichaPedidoHTML(e.id, data, true)).filter(Boolean).join('');

  document.getElementById('printArea').innerHTML=sheets; window.print();

      <button class="btn sm" style="margin:0" onclick="modalEmpresa()">+ Nova empresa</button>

    </div>
    <div class="card" style="padding:6px 6px 2px;overflow:auto">
      <table><thead><tr><th>Empresa</th><th>Refeições / preço</th><th>Status</th><th></th></tr></thead>

    </div>`;
}

function modalEmpresa(id){
  const e = id? getEmpresa(id) : null;
  const ref = (e&&e.ref)||{};
  const refRow = r=>{
    const on = ref[r.key] && ref[r.key].on;
    return `<tr>
      <td><label style="display:flex;align-items:center;gap:8px;font-size:14px"><input type="checkbox" id="me-on-${r.key}" ${on?'checked':''}> ${r.emoji} ${r.nome}</label></td>
      <td><input id="me-preco-${r.key}" type="number" step="0.01" placeholder="preço R$" value="${on&&ref[r.key].preco?ref[r.key].preco:''}" style="width:110px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)"></td>
      <td><input id="me-qtd-${r.key}" type="number" placeholder="qtd contrato" value="${on&&ref[r.key].qtd?ref[r.key].qtd:''}" style="width:110px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)"></td>
    </tr>`;
  };
  openModal(`
    <h3>${e?'Editar empresa':'Nova empresa'}</h3>
    <p class="sub">Quais refeições essa empresa pede, o preço por refeição e a quantidade média do contrato (usada como sugestão e no automático).</p>
    <div class="row2">
      <div class="field"><label>Nome da empresa *</label><input id="me-nome" value="${e?esc(e.nome):''}" placeholder="Ex: Moura"></div>
      <div class="field"><label>Grupo (opcional)</label><input id="me-grupo" value="${e?esc(e.grupo||''):''}" placeholder="Ex: TikTok"></div>
    </div>
    <div class="row2">
      <div class="field"><label>Responsável</label><input id="me-resp" value="${e?esc(e.responsavel||''):''}" placeholder="Nome do contato"></div>
      <div class="field"><label>Telefone</label><input id="me-tel" value="${e?esc(e.telefone||''):''}" placeholder="(85) ..."></div>
    </div>
    <div class="field"><label>Grupo de cardápio (qual percapta usar)</label>
      <select id="me-cardgrupo">${CARD_GRUPOS.map(x=>`<option ${ (e?cardapioGrupoDe(e):'')===x?'selected':''}>${x}</option>`).join('')}</select></div>
    <div class="section-title">Refeições do contrato</div>
    <table style="font-size:13px"><thead><tr><th>Refeição</th><th>Preço/refeição</th><th>Qtd contrato</th></tr></thead>
      <tbody>${REFEICOES.map(refRow).join('')}</tbody></table>
    ${e?`<label style="display:flex;align-items:center;gap:8px;font-size:14px;margin-top:14px"><input type="checkbox" id="me-ativo" ${e.ativo!==false?'checked':''}> Empresa ativa</label>`:''}
    <div style="display:flex;gap:10px;margin-top:20px">
      <button class="btn" style="margin:0" onclick="salvarEmpresa('${id||''}')">Salvar</button>
      <button class="btn ghost" style="margin:0" onclick="closeModal()">Cancelar</button>
      ${e?`<button class="btn danger" style="margin:0 0 0 auto;width:auto;padding:13px 16px" onclick="excluirEmpresaPed('${e.id}','${esc(e.nome)}')">Excluir</button>`:''}
    </div>
  `);
}
function salvarEmpresa(id){
  const g=i=>{const el=document.getElementById(i);return el?el.value.trim():'';};
  const nome=g('me-nome');
  if(!nome){ alert('Informe o nome da empresa.'); return; }
  const ref={};
  REFEICOES.forEach(r=>{
    const on=document.getElementById('me-on-'+r.key).checked;
    ref[r.key]={ on, preco:Number(document.getElementById('me-preco-'+r.key).value)||0, qtd:Number(document.getElementById('me-qtd-'+r.key).value)||0 };
  });
  const data={ nome, grupo:g('me-grupo'), responsavel:g('me-resp'), telefone:g('me-tel'), cardapioGrupo:g('me-cardgrupo'), ref };
  if(id){
    const a=document.getElementById('me-ativo'); data.ativo = a? a.checked : true;
    db.collection('ped_empresas').doc(id).set(data,{merge:true})
      .then(()=>{ closeModal(); toast('Empresa atualizada', nome); })
      .catch(e=>alert('Erro: '+(e.code||e.message)));
  } else {
    data.ativo=true; data.criadoEm=Date.now();
    db.collection('ped_empresas').add(data)
      .then(()=>{ closeModal(); toast('Empresa cadastrada', nome); })
      .catch(e=>alert('Erro: '+(e.code||e.message)));
  }
}
function excluirEmpresaPed(id,nome){
  if(!confirm('Excluir a empresa "'+nome+'"? Os pedidos já feitos continuam no histórico, mas ela some do painel.')) return;
  db.collection('ped_empresas').doc(id).delete().then(()=>{ closeModal(); toast('Empresa excluída', nome); _empSel=null; })
    .catch(e=>alert('Erro: '+(e.code||e.message)));
}

/* importar empresas da planilha de faturamento */
function modalImportar(){
  const lista=window.EMPRESAS_FATURAMENTO||[];
  if(!lista.length){ alert('Nenhuma empresa carregada da planilha.'); return; }
  const jaTem = new Set(DB.empresas.map(e=>e.id));
  const novas = lista.filter(e=>!jaTem.has(e.id)).length;
  const grupos={}; lista.forEach(e=>{ const g=e.grupo||'Outros'; grupos[g]=(grupos[g]||0)+1; });
  const resumo=Object.entries(grupos).sort((a,b)=>b[1]-a[1]).map(([g,n])=>`<span class="tag" style="margin:2px">${esc(g)}: ${n}</span>`).join('');
  openModal(`
    <h3>Importar da planilha de faturamento</h3>
    <p class="sub">São <b>${lista.length}</b> empresas com preços e quantidades já preenchidos pela planilha de faturamento diário. ${novas<lista.length?`<b>${lista.length-novas}</b> já existem e serão atualizadas; <b>${novas}</b> são novas.`:'Todas são novas.'}</p>
    <div style="margin:6px 0 14px;line-height:1.9">${resumo}</div>
    <div class="auto-note">As quantidades viram a sugestão/contrato de cada empresa. Você pode ajustar preço, refeições e quantidade depois em cada empresa. Importar de novo só atualiza (não duplica).</div>
    <div class="err" id="imp-err"></div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn" style="margin:0" id="imp-btn" onclick="importarEmpresas()">Importar ${lista.length} empresas</button>
      <button class="btn ghost" style="margin:0" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}
function importarEmpresas(){
  const lista=window.EMPRESAS_FATURAMENTO||[];
  const btn=document.getElementById('imp-btn'); btn.disabled=true; btn.textContent='Importando...';
  const jaTem={}; DB.empresas.forEach(e=>jaTem[e.id]=e);
  const batch=db.batch();
  lista.forEach(e=>{
    const ref=db.collection('ped_empresas').doc(e.id);
    const ativo = jaTem[e.id] ? (jaTem[e.id].ativo!==false) : true;
    batch.set(ref, { nome:e.nome, grupo:e.grupo||'', ref:e.ref, origem:e.origem||'', ativo, importadoEm:Date.now() }, {merge:true});
  });
  batch.commit()
    .then(()=>{ closeModal(); toast('Importação concluída', lista.length+' empresas da planilha'); })
    .catch(err=>{ btn.disabled=false; btn.textContent='Importar '+lista.length+' empresas';
      document.getElementById('imp-err').textContent='Erro: '+(err.code||err.message); });
}

function modalAcesso(){
  const empresas=DB.empresas.filter(e=>e.ativo!==false).sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));
  if(!empresas.length){ alert('Cadastre uma empresa primeiro (aba Empresas & contratos).'); return; }
  openModal(`
    <h3>Novo acesso de cliente</h3>
    <p class="sub">O solicitante recebe e-mail + senha inicial. Ele troca a senha depois, dentro do app.</p>
    <div class="field"><label>Empresa *</label>
      <select id="ma-empresa">${empresas.map(e=>`<option value="${e.id}">${esc(e.nome)}${e.grupo?' — '+esc(e.grupo):''}</option>`).join('')}</select></div>
    <div class="field"><label>Nome do responsável *</label><input id="ma-nome" placeholder="Quem vai fazer os pedidos"></div>
    <div class="row2">
      <div class="field"><label>E-mail (login) *</label><input id="ma-email" type="email" placeholder="email@empresa.com"></div>
      <div class="field"><label>Telefone</label><input id="ma-tel" placeholder="(85) ..."></div>
    </div>
    <div class="field"><label>Senha inicial *</label>
      <input id="ma-senha" value="totalfood123" placeholder="mínimo 6 caracteres">
      <div class="hint">Sugestão: deixe <b>totalfood123</b> e peça pro cliente trocar no primeiro acesso.</div></div>
    <div class="err" id="ma-err"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn" style="margin:0" id="ma-btn" onclick="criarAcesso()">Criar acesso</button>
      <button class="btn ghost" style="margin:0" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}
function criarAcesso(){
  const g=i=>{const el=document.getElementById(i);return el?el.value.trim():'';};
  const empresaId=g('ma-empresa'), nome=g('ma-nome'), email=g('ma-email').toLowerCase(), tel=g('ma-tel'), senha=document.getElementById('ma-senha').value;
  const err=document.getElementById('ma-err'); err.textContent='';
  if(!empresaId||!nome||!email){ err.textContent='Preencha empresa, nome e e-mail.'; return; }
  if(senha.length<6){ err.textContent='A senha inicial precisa ter ao menos 6 caracteres.'; return; }
  const btn=document.getElementById('ma-btn'); btn.disabled=true; btn.textContent='Criando...';
  // app secundário: cria o usuário SEM deslogar você
  if(!secondaryApp) secondaryApp=firebase.initializeApp(firebaseConfig, 'secondary');
  const secAuth=secondaryApp.auth();
  secAuth.createUserWithEmailAndPassword(email, senha)
    .then(()=> secAuth.signOut())
    .then(()=> db.collection('ped_usuarios').doc(email).set({ email, nome, telefone:tel, empresaId, perfil:'solicitante', criadoEm:Date.now() }))
    .then(()=>{ closeModal(); toast('Acesso criado', nome+' • '+email); })
    .catch(e=>{
      btn.disabled=false; btn.textContent='Criar acesso';
      if(e.code==='auth/email-already-in-use'){
        // já existe no Auth: só registra o vínculo
        db.collection('ped_usuarios').doc(email).set({ email, nome, telefone:tel, empresaId, perfil:'solicitante', criadoEm:Date.now() })
          .then(()=>{ closeModal(); toast('Acesso vinculado', email+' (conta já existia)'); })
          .catch(er=> err.textContent='Erro: '+(er.code||er.message));
      } else { err.textContent=traduzErro(e.code); }
    });
}
function resetSenhaCliente(email){
  auth.sendPasswordResetEmail(email)
    .then(()=>toast('Link enviado', 'Redefinição de senha para '+email))
    .catch(e=>alert('Erro: '+traduzErro(e.code)));
}
function removerAcesso(id, nome){
  if(!confirm('Remover o acesso de "'+nome+'"? Ele não consegue mais entrar.\n(A conta de login continua no Firebase; para apagar de vez, use o Console.)')) return;
  db.collection('ped_usuarios').doc(id).delete().then(()=>toast('Acesso removido', nome))
    .catch(e=>alert('Erro: '+(e.code||e.message)));
}


/* =====================================================================
   CLIENTE — DAR OPINIÃO (grava em ocorrencias)
===================================================================== */
let TIPO_OPI='Reclamação';
const TIPOS_OPI=[['Reclamação','😟'],['Sugestão','💡'],['Elogio','😍'],['Solicitação','🙋']];
function viewOpiniao(){
  const emp=getEmpresa(USER.empresaId);
  const minhas=DB.ocorrencias.filter(o=> (emp && (o.empresaId===emp.id || mesmaEmpresa(o, normEmpresa(emp.nome)))) )
    .sort((a,b)=>(b.criadoEm||'').localeCompare(a.criadoEm||'')).slice(0,6);
  const isRecl = TIPO_OPI==='Reclamação';
  return `<h2 class="page">Dar opinião</h2>
   <p class="sub">Reclamação, sugestão, elogio ou solicitação sobre as refeições${emp?` de <b style="color:var(--txt)">${esc(emp.nome)}</b>`:''}. A equipe é avisada na hora.</p>
   <div class="pill-tabs" id="opiTabs">
     ${TIPOS_OPI.map(([t,e])=>`<button class="${t===TIPO_OPI?'active':''}" onclick="setTipoOpiniao('${t}')">${e} ${t}</button>`).join('')}
   </div>
   <div class="card">
     ${isRecl?`<div class="row2">
       <div class="field"><label>O que houve?</label>
         <select id="opi-tiporecl"><option>Temperatura (chegou fria)</option><option>Sabor</option><option>Atraso/Pontualidade</option><option>Quantidade</option><option>Variedade</option><option>Higiene</option><option>Atendimento</option><option>Outro</option></select></div>
       <div class="field"><label>Urgência</label>
         <select id="opi-urg"><option>Baixa</option><option>Média</option><option selected>Alta</option><option>Crítica</option></select></div>
     </div>`:''}
     <div class="field"><label>Descrição</label><textarea id="opi-desc" placeholder="Conte o que aconteceu..."></textarea></div>
     <button class="btn" onclick="enviarOpiniao()">Enviar opinião</button>
   </div>
   ${minhas.length?`<div class="section-title">Suas últimas opiniões</div>
     <div class="card" style="padding:6px 6px 2px;overflow:auto">${tabelaOcorrencias(minhas,true)}</div>`:''}`;
}
function setTipoOpiniao(t){ TIPO_OPI=t; render(); }
function enviarOpiniao(){
  const emp=getEmpresa(USER.empresaId);
  const desc=(document.getElementById('opi-desc').value||'').trim();
  if(!desc){ alert('Descreva sua opinião.'); return; }
  const isRecl=TIPO_OPI==='Reclamação';
  const o={ empresaId:USER.empresaId||'', empresaNome:emp?emp.nome:'', tipo:TIPO_OPI,
    data:new Date().toISOString().slice(0,10), hora:new Date().toTimeString().slice(0,5),
    tipoReclamacao: isRecl?(document.getElementById('opi-tiporecl').value):'',
    descricao:desc, urgencia: isRecl?(document.getElementById('opi-urg').value):'',
    status: isRecl?'Aberto':'Encerrado', responsavel:'', prazo:'', acao:'',
    por:USER.nome, origem:'cliente', criadoEm:new Date().toISOString() };
  db.collection('ocorrencias').add(o)
    .then(()=>{ document.getElementById('opi-desc').value='';
      toast(isRecl?'Reclamação enviada':TIPO_OPI+' enviada', 'A equipe da TOTAL FOOD foi avisada. Obrigado!'); render(); })
    .catch(e=>alert('Erro ao enviar: '+(e.code||e.message)));
}
